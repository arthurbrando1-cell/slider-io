<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Gamer Deals</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #020205;
            --side: #08080f;
            --card: rgba(15, 15, 25, 0.7);
            --primary: #bc13fe;
            --secondary: #00f2ff;
            --hot: #ff0055;
            --text: #e2e8f0;
            --dim: #64748b;
            --glow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); overflow-x: hidden; 
            display: flex; min-height: 100vh;
        }

        /* --- INTRO CINEMATOGRÁFICA --- */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .intro-content { text-align: center; }
        
        .logo-glitch {
            font-family: 'Syncopate', sans-serif; font-size: 3rem; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 5px;
            animation: glitch 1s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--hot); transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            100% { text-shadow: -2px 0 var(--secondary); transform: skew(0deg); }
        }

        .loader-bar {
            width: 200px; height: 2px; background: rgba(255,255,255,0.1);
            margin-top: 20px; position: relative; overflow: hidden;
        }

        .loader-progress {
            position: absolute; width: 40%; height: 100%;
            background: var(--primary); box-shadow: 0 0 15px var(--primary);
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -50%; } 100% { left: 100%; }
        }

        /* --- SIDEBAR SHARP --- */
        aside {
            width: 280px; background: var(--side); height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.05);
            position: fixed; display: flex; flex-direction: column; padding: 40px 20px;
        }

        .nav-link {
            display: flex; align-items: center; gap: 15px; padding: 16px;
            border-radius: 8px; color: var(--dim); cursor: pointer;
            transition: 0.3s; margin-bottom: 5px; font-weight: 500;
        }

        .nav-link:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-link.active { 
            background: linear-gradient(90deg, rgba(188, 19, 254, 0.1), transparent);
            color: var(--primary); border-left: 3px solid var(--primary);
        }

        /* --- MAIN AREA --- */
        main { flex: 1; margin-left: 280px; padding: 50px; }

        .section { display: none; opacity: 0; transform: translateY(30px); }
        .section.active { display: block; animation: appear 0.6s forwards; }

        @keyframes appear { to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS NEON --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; overflow: hidden; transition: 0.4s;
            backdrop-filter: blur(10px); position: relative;
        }

        .card:hover { 
            border-color: var(--primary); transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--glow);
        }

        .card-img { width: 100%; height: 220px; object-fit: cover; background: #000; }
        
        .badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--hot); padding: 4px 12px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; color: white;
            box-shadow: 0 0 10px var(--hot);
        }

        .card-content { padding: 20px; }
        .price-tag { 
            font-size: 1.8rem; font-weight: 700; color: var(--secondary);
            margin: 10px 0; text-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .btn-buy {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 6px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-buy:hover { filter: brightness(1.2); box-shadow: var(--glow); }

        /* --- FORM --- */
        .post-form { max-width: 600px; background: var(--side); padding: 40px; border-radius: 15px; border: 1px solid var(--primary); }
        input, select { 
            width: 100%; background: #000; border: 1px solid #333; 
            padding: 12px; color: white; border-radius: 6px; margin: 10px 0 20px;
        }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--primary); color: white; padding: 15px 40px; border-radius: 50px;
            font-weight: 700; transition: 0.5s; z-index: 10000;
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0; }
            main { margin-left: 0; padding: 20px 20px 100px; }
            .nav-link span { display: none; }
            .nav-link { flex: 1; justify-content: center; }
            .logo-glitch { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="intro-content">
            <div class="logo-glitch">TÁ NA PROMO!</div>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>
    </div>

    <div id="toast">Sucesso!</div>

    <aside>
        <div style="padding: 0 20px; margin-bottom: 30px;" class="mobile-hide">
            <h2 style="color: var(--primary); font-family: 'Syncopate';">DEALS</h2>
        </div>
        <div class="nav-link active" onclick="nav('feed', this)"><i data-lucide="flame"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="nav('post', this)"><i data-lucide="plus-square"></i> <span>Postar</span></div>
        <div class="nav-link" onclick="nav('coupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="nav('favs', this)"><i data-lucide="heart"></i> <span>Salvos</span></div>
    </aside>

    <main>
        <div id="feed" class="section active">
            <h1 style="margin-bottom: 40px; font-size: 2.5rem;">Ofertas do Dia</h1>
            <div class="grid" id="promo-list"></div>
        </div>

        <div id="post" class="section">
            <div class="post-form">
                <h2>Anunciar Promo</h2>
                <form id="f-promo">
                    <input type="text" id="title" placeholder="Nome do Produto" required>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="price" placeholder="Preço Promo" required>
                        <input type="number" id="old" placeholder="Preço Antigo" required>
                    </div>
                    <input type="url" id="link" placeholder="Link da Loja" required>
                    <input type="url" id="img" placeholder="URL da Imagem">
                    <button type="submit" class="btn-buy">POSTAR AGORA</button>
                </form>
            </div>
        </div>

        <div id="coupons" class="section">
            <h1>Cupons Ativos</h1>
            <div class="grid" id="coupon-list"></div>
        </div>

        <div id="favs" class="section">
            <h1>Meus Favoritos</h1>
            <div class="grid" id="fav-list"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const promosRef = ref(db, 'promos');

        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('saved_deals')) || [];

        // --- SEGURANÇA: SAIR DA INTRO SE O FIREBASE TRAVAR ---
        const exitIntro = () => {
            const intro = document.getElementById('intro');
            if (intro) {
                intro.style.opacity = '0';
                intro.style.transform = 'scale(1.2)';
                setTimeout(() => intro.remove(), 800);
            }
        };
        setTimeout(exitIntro, 3500); // Força saída em 3.5s

        // Navegação
        window.nav = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'favs') renderFavs();
        };

        // Render Cards
        const render = (data, targetId) => {
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            data.forEach(item => {
                const discount = Math.round(((item.old - item.price) / item.old) * 100);
                const isSaved = favorites.includes(item.id);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    ${discount > 20 ? `<div class="badge">-${discount}%</div>` : ''}
                    <img src="${item.img || 'https://via.placeholder.com/400x300/000/fff?text=Gamer'}" class="card-img">
                    <div class="card-content">
                        <h3>${item.title}</h3>
                        <div class="price-tag">R$ ${item.price}</div>
                        <div style="color: var(--dim); text-decoration: line-through; margin-bottom: 15px;">R$ ${item.old}</div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-buy" onclick="window.open('${item.link}')"><i data-lucide="external-link"></i> LOJA</button>
                            <button class="btn-buy" style="background: #1a1a1a; width: 60px;" onclick="toggleFav('${item.id}')">
                                <i data-lucide="heart" ${isSaved ? 'fill="red" stroke="red"' : ''}></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        };

        // Escuta Firebase
        onValue(promosRef, (snap) => {
            const val = snap.val();
            allData = val ? Object.entries(val).map(([id, d]) => ({ id, ...d })).reverse() : [];
            render(allData, 'promo-list');
            exitIntro();
        });

        // Postar
        document.getElementById('f-promo').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            
            const data = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                old: document.getElementById('old').value,
                link: document.getElementById('link').value,
                img: document.getElementById('img').value,
                ts: Date.now()
            };

            await push(promosRef, data);
            toast("PROMOÇÃO LANÇADA!");
            e.target.reset();
            btn.disabled = false;
            nav('feed', document.querySelector('.nav-link'));
        };

        window.toggleFav = (id) => {
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('saved_deals', JSON.stringify(favorites));
            render(allData, 'promo-list');
            if(document.getElementById('favs').classList.contains('active')) renderFavs();
            toast("Favoritos atualizados!");
        };

        const renderFavs = () => {
            const favItems = allData.filter(d => favorites.includes(d.id));
            render(favItems, 'fav-list');
        };

        const toast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => t.style.transform = 'translateX(-50%) translateY(100px)', 3000);
        };

        // Cupons estáticos
        const coupons = [
            { title: 'KABUM NINJA', price: '15% OFF', old: 'SITE TODO', link: '#', img: '' },
            { title: 'AMAZON GAMER', price: 'R$ 50', old: 'ACIMA R$ 500', link: '#', img: '' }
        ];
        render(coupons, 'coupon-list');

        lucide.createIcons();
    </script>
</body>
</html>
