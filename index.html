<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Elite Market</title>
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #050505;
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #ffffff;
            --accent: #222;
            --gradient: linear-gradient(135deg, #ffffff 0%, #666666 100%);
            --grad-bg: radial-gradient(circle at top right, #111, #000);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); background-image: var(--grad-bg); color: #fff; min-height: 100vh; overflow-x: hidden; display: flex; }

        /* --- INTRO PREMIUM --- */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .intro-title { font-family: 'Syncopate'; font-size: 2.5rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite; }

        /* --- SIDEBAR GLASS --- */
        aside {
            width: 280px; background: var(--glass); backdrop-filter: blur(20px); height: 100vh;
            border-right: 1px solid var(--border); position: fixed; display: flex; flex-direction: column; padding: 40px 20px; z-index: 100;
        }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 12px;
            color: #666; cursor: pointer; transition: 0.4s; margin-bottom: 8px; border: 1px solid transparent;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: #fff; color: #000; font-weight: 800; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- MAIN AREA --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.6s ease-out forwards; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CATEGORIAS --- */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 30px; scrollbar-width: none; }
        .cat-chip { background: var(--glass); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 0.85rem; font-weight: 600; }
        .cat-chip:hover, .cat-chip.active { background: #fff; color: #000; border-color: #fff; }

        /* --- CARDS ALIEXPRESS PRO --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .item-card:hover { transform: scale(1.03); border-color: rgba(255,255,255,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; transition: 0.6s; }
        .item-card:hover .item-img { filter: brightness(1.1); }
        .item-info { padding: 16px; background: linear-gradient(to top, #000, transparent); }
        .item-price { font-size: 1.4rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- CUPONS ÁREA --- */
        .coupon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .coupon-card {
            background: linear-gradient(45deg, #111, #1a1a1a); border: 1px dashed #444; padding: 25px;
            border-radius: 16px; position: relative; overflow: hidden; transition: 0.3s;
        }
        .coupon-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, #fff, transparent 30%); animation: rotate 4s linear infinite; opacity: 0.1; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cp-code { font-family: 'Syncopate'; font-size: 1.2rem; color: #fff; margin-top: 10px; display: block; letter-spacing: 2px; }

        /* --- FORMULÁRIO ESTILIZADO --- */
        .form-group { background: var(--glass); border: 1px solid var(--border); padding: 30px; border-radius: 20px; max-width: 600px; margin: 0 auto; }
        input, textarea, select {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #fff; background: rgba(255,255,255,0.07); }
        .btn-post { background: #fff; color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; text-transform: uppercase; transition: 0.3s; }
        .btn-post:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

        /* --- MODAL --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 200; display: none; padding: 40px; overflow-y: auto; }
        .modal-body { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding: 20px 20px 100px; }
            .nav-link span { display: none; }
            .modal-body { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="intro"><div class="intro-title">TA NA PROMO!</div></div>

    <aside>
        <div style="font-family: 'Syncopate'; font-size: 0.8rem; margin-bottom: 40px; text-align: center; letter-spacing: 2px;">TN PROMO.</div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('coupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('setup', this)"><i data-lucide="cpu"></i> <span>Meu Setup</span></div>
        <div class="nav-link" onclick="tab('post-area', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <div class="cat-bar">
                <div class="cat-chip active">Tudo</div>
                <div class="cat-chip">Hardware</div>
                <div class="cat-chip">Periféricos</div>
                <div class="cat-chip">Consoles</div>
                <div class="cat-chip">Cadeiras</div>
            </div>
            <div class="grid" id="market-grid"></div>
        </section>

        <section id="coupons" class="section">
            <h1 style="font-family: 'Syncopate'; margin-bottom: 30px;">CUPONS ATIVOS</h1>
            <div class="coupon-grid" id="coupon-list"></div>
        </section>

        <section id="post-area" class="section">
            <div class="form-group">
                <h2 style="margin-bottom: 20px; text-align: center;">O QUE VOCÊ QUER POSTAR?</h2>
                <select id="post-type" onchange="toggleForm()">
                    <option value="prod">Novo Produto</option>
                    <option value="cupom">Novo Cupom</option>
                </select>
                
                <div id="form-prod">
                    <input type="text" id="p-title" placeholder="Nome do Produto">
                    <input type="number" id="p-price" placeholder="Preço (R$)">
                    <input type="url" id="p-img" placeholder="Link da Imagem/GIF">
                    <textarea id="p-desc" placeholder="Descrição detalhada..." rows="4"></textarea>
                </div>

                <div id="form-cupom" style="display:none">
                    <input type="text" id="c-store" placeholder="Loja (Ex: Amazon, Kabum)">
                    <input type="text" id="c-code" placeholder="CÓDIGO DO CUPOM">
                    <input type="text" id="c-desc" placeholder="Desconto (Ex: 10% OFF em tudo)">
                </div>

                <button class="btn-post" onclick="publish()">Postar Agora</button>
            </div>
        </section>
    </main>

    <div id="modal">
        <button onclick="closeModal()" style="position:fixed; top:20px; right:20px; background:white; border:none; padding:10px; border-radius:50%; cursor:pointer;"><i data-lucide="x" color="black"></i></button>
        <div class="modal-body">
            <img id="m-img" style="width:100%; border-radius:20px;">
            <div>
                <h1 id="m-title" style="font-size: 2.5rem; margin-bottom: 10px;"></h1>
                <div id="m-price" style="font-size: 2rem; font-weight: 800; margin-bottom: 20px;"></div>
                <p id="m-desc" style="color:#888; line-height:1.8; margin-bottom:30px;"></p>
                <button class="btn-post" style="background: #00ff88; color:#000">Salvar no Setup</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CARREGAMENTO ---
        onValue(ref(db, 'market'), (snap) => {
            const data = snap.val();
            const list = data ? Object.entries(data).reverse() : [];
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            list.forEach(([id, p]) => {
                grid.innerHTML += `
                    <div class="item-card" onclick="openModal('${p.img}', '${p.title}', '${p.price}', '${p.desc}')">
                        <img src="${p.img}" class="item-img">
                        <div class="item-info">
                            <div class="item-price">R$ ${p.price}</div>
                            <div style="font-size:0.8rem; color:#666">${p.title}</div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
            setTimeout(() => document.getElementById('intro').style.transform = 'translateY(-100%)', 2000);
        });

        onValue(ref(db, 'cupons'), (snap) => {
            const data = snap.val();
            const list = data ? Object.entries(data).reverse() : [];
            const grid = document.getElementById('coupon-list');
            grid.innerHTML = '';
            list.forEach(([id, c]) => {
                grid.innerHTML += `
                    <div class="coupon-card">
                        <small style="color:#888">${c.store}</small>
                        <strong class="cp-code">${c.code}</strong>
                        <p style="margin-top:10px; color:#fff; font-weight:600">${c.desc}</p>
                    </div>
                `;
            });
        });

        // --- FUNÇÕES ---
        window.toggleForm = () => {
            const type = document.getElementById('post-type').value;
            document.getElementById('form-prod').style.display = type === 'prod' ? 'block' : 'none';
            document.getElementById('form-cupom').style.display = type === 'cupom' ? 'block' : 'none';
        };

        window.publish = async () => {
            const type = document.getElementById('post-type').value;
            if(type === 'prod') {
                const title = document.getElementById('p-title').value;
                const price = document.getElementById('p-price').value;
                const img = document.getElementById('p-img').value;
                const desc = document.getElementById('p-desc').value;
                await push(ref(db, 'market'), { title, price, img, desc });
            } else {
                const store = document.getElementById('c-store').value;
                const code = document.getElementById('c-code').value;
                const desc = document.getElementById('c-desc').value;
                await push(ref(db, 'cupons'), { store, code, desc });
            }
            tab('feed', document.querySelector('.nav-link'));
        };

        window.openModal = (img, title, price, desc) => {
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-price').innerText = 'R$ ' + price;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('modal').style.display = 'block';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
