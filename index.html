<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TÁ NA PROMO!</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { background:#020205; color:white; font-family:sans-serif; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.card { background:#111; padding:15px; border-radius:10px; }
img { width:100%; height:200px; object-fit:cover; }
button { margin-top:5px; cursor:pointer; }
</style>
</head>

<body>

<h1>TÁ NA PROMO 🔥</h1>

<h2>Postar Promo</h2>
<form id="promoForm">
<input id="title" placeholder="Nome" required>
<input id="price" type="number" step="0.01" min="0.01" placeholder="Preço" required>
<input id="old" type="number" step="0.01" min="0.01" placeholder="Antigo" required>
<input id="link" placeholder="Link" required>
<input id="img" placeholder="Imagem (GIF OK)">
<button>Postar</button>
</form>

<h2>Postar Cupom</h2>
<form id="couponForm">
<input id="ctitle" placeholder="Cupom" required>
<input id="cdesc" placeholder="Descrição" required>
<button>Postar Cupom</button>
</form>

<h2>Promos</h2>
<div class="grid" id="promos"></div>

<h2>Cupons</h2>
<div class="grid" id="coupons"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
    apiKey: "SUA KEY",
    databaseURL: "SUA URL"
});

const db = getDatabase(app);

const promosRef = ref(db, "promos");
const couponsRef = ref(db, "coupons");

// ID simples do usuário
let userId = localStorage.getItem("uid");
if (!userId) {
    userId = Math.random().toString(36).slice(2);
    localStorage.setItem("uid", userId);
}

// POST PROMO
promoForm.onsubmit = async e => {
    e.preventDefault();

    await push(promosRef, {
        title: title.value,
        price: parseFloat(price.value),
        old: parseFloat(old.value),
        link: link.value,
        img: img.value,
        likes: 0,
        dislikes: 0,
        owner: userId
    });

    promoForm.reset();
};

// POST CUPOM
couponForm.onsubmit = async e => {
    e.preventDefault();

    await push(couponsRef, {
        title: ctitle.value,
        desc: cdesc.value,
        likes: 0,
        dislikes: 0,
        owner: userId
    });

    couponForm.reset();
};

// RENDER PROMOS
onValue(promosRef, snap => {
    promos.innerHTML = "";
    snap.forEach(item => {
        const d = item.val();
        const id = item.key;

        promos.innerHTML += `
        <div class="card">
            <img src="${d.img || 'https://via.placeholder.com/400'}">
            <h3>${d.title}</h3>
            <p>R$ ${d.price}</p>
            <small>De R$ ${d.old}</small>

            <br>
            👍 ${d.likes} 👎 ${d.dislikes}

            <br>
            <button onclick="vote('promos','${id}',1)">👍</button>
            <button onclick="vote('promos','${id}',-1)">👎</button>

            <br>
            <button onclick="window.open('${d.link}')">Abrir</button>

            ${d.owner === userId ? `<button onclick="del('promos','${id}')">🗑️</button>` : ""}
        </div>`;
    });
});

// RENDER CUPONS
onValue(couponsRef, snap => {
    coupons.innerHTML = "";
    snap.forEach(item => {
        const d = item.val();
        const id = item.key;

        coupons.innerHTML += `
        <div class="card">
            <h3>${d.title}</h3>
            <p>${d.desc}</p>

            👍 ${d.likes} 👎 ${d.dislikes}

            <br>
            <button onclick="vote('coupons','${id}',1)">👍</button>
            <button onclick="vote('coupons','${id}',-1)">👎</button>

            ${d.owner === userId ? `<button onclick="del('coupons','${id}')">🗑️</button>` : ""}
        </div>`;
    });
});

// VOTAR
window.vote = (type, id, val) => {
    const r = ref(db, `${type}/${id}`);

    update(r, val === 1
        ? { likes: (Math.random()*1)+1 }
        : { dislikes: (Math.random()*1)+1 }
    );
};

// DELETAR
window.del = (type, id) => {
    if (confirm("Excluir?")) {
        remove(ref(db, `${type}/${id}`));
    }
};
</script>

</body>
</html>
