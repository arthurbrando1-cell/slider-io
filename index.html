<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Elite Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #000;
            --glass: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --primary: #fff;
            --gradient: linear-gradient(180deg, #fff 0%, #444 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; overflow-x: hidden; }

        /* --- INTRO LOGO 3D GIGANTE --- */
        #intro {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1); perspective: 1200px;
        }
        .intro-container {
            position: relative; animation: float3D 4s infinite ease-in-out; transform-style: preserve-3d;
        }
        .intro-logo {
            width: 450px; height: auto; display: block;
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.25));
        }
        /* Texto caso a imagem falhe */
        .logo-fallback {
            font-family: 'Syncopate'; font-size: 3.5rem; letter-spacing: 10px;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes float3D {
            0%, 100% { transform: rotateY(-25deg) rotateX(10deg) translateZ(50px); }
            50% { transform: rotateY(25deg) rotateX(-10deg) translateZ(100px) translateY(-30px); }
        }

        /* --- SIDEBAR --- */
        aside {
            width: 280px; background: var(--glass); backdrop-filter: blur(25px); height: 100vh;
            border-right: 1px solid var(--border); position: fixed; display: flex; flex-direction: column; padding: 40px 20px; z-index: 100;
        }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 18px; border-radius: 12px;
            color: #555; cursor: pointer; transition: 0.4s; margin-bottom: 10px; border: 1px solid transparent;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: #fff; color: #000; font-weight: 800; box-shadow: 0 10px 30px rgba(255,255,255,0.15); }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 280px; padding: 50px; }
        .section { display: none; animation: slideIn 0.8s ease-out; }
        .section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        /* --- CARDS ALIEXPRESS STYLE --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .item-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); cursor: pointer; position: relative;
        }
        .item-card:hover { transform: translateY(-10px) scale(1.02); border-color: #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; transition: 0.8s; }
        .item-info { padding: 20px; background: linear-gradient(0deg, #000 0%, transparent 100%); }
        .item-price { font-size: 1.6rem; font-weight: 900; color: #fff; font-family: 'Syncopate'; }

        /* --- CUPONS PREMIUM --- */
        .coupon-card {
            background: #0a0a0a; border: 2px dashed #333; padding: 30px; border-radius: 20px;
            position: relative; transition: 0.4s; overflow: hidden;
        }
        .coupon-card:hover { border-color: #fff; background: #111; }
        .cp-code { display: block; font-family: 'Syncopate'; font-size: 1.4rem; color: #fff; margin: 15px 0; letter-spacing: 3px; }

        /* --- MODAL --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 500; display: none; padding: 60px; }
        .modal-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; animation: zoomIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        button.primary { background: #fff; color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button.primary:hover { background: #ddd; transform: translateY(-3px); }

        input, textarea, select { width: 100%; background: #0f0f0f; border: 1px solid #333; padding: 18px; border-radius: 12px; color: #fff; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #fff; }

        @media (max-width: 1000px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding: 20px 20px 100px; }
            .nav-link span { display: none; }
            .modal-content { grid-template-columns: 1fr; padding-top: 40px; }
            .intro-logo { width: 80%; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="intro-container">
            <img src="logo.png" class="intro-logo" id="main-logo" onerror="showFallback()">
            <div id="logo-text" class="logo-fallback" style="display:none">TA NA PROMO!</div>
        </div>
    </div>

    <aside>
        <div style="font-family: 'Syncopate'; font-size: 1rem; margin-bottom: 50px; text-align: center; color: #fff;">TN.PROMO</div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="shopping-bag"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('coupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post-area', this)"><i data-lucide="plus-square"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <h2 style="font-family: 'Syncopate'; margin-bottom: 30px; font-size: 1.2rem;">MELHORES OFERTAS</h2>
            <div class="grid" id="market-grid"></div>
        </section>

        <section id="coupons" class="section">
            <h2 style="font-family: 'Syncopate'; margin-bottom: 30px;">CUPONS DE HOJE</h2>
            <div class="grid" id="coupon-list"></div>
        </section>

        <section id="post-area" class="section">
            <div style="max-width: 600px; margin: 0 auto; background: #080808; padding: 40px; border-radius: 20px; border: 1px solid #222;">
                <h2 style="margin-bottom: 30px; text-align: center; font-family: 'Syncopate';">PUBLICAR</h2>
                <select id="post-type" onchange="toggleForm()">
                    <option value="prod">Hardware / Produto</option>
                    <option value="cupom">Cupom de Desconto</option>
                </select>
                
                <div id="form-prod">
                    <input type="text" id="p-title" placeholder="Nome do Produto">
                    <input type="number" id="p-price" placeholder="Preço (R$)">
                    <input type="url" id="p-img" placeholder="Link da Imagem ou GIF">
                    <textarea id="p-desc" placeholder="Descrição técnica..." rows="5"></textarea>
                </div>

                <div id="form-cupom" style="display:none">
                    <input type="text" id="c-store" placeholder="Loja (Ex: Amazon)">
                    <input type="text" id="c-code" placeholder="CÓDIGO">
                    <input type="text" id="c-desc" placeholder="Ex: R$ 50 OFF">
                </div>

                <button class="primary" onclick="publish()">Publicar Agora</button>
            </div>
        </section>
    </main>

    <div id="modal">
        <button onclick="closeModal()" style="position:fixed; top:30px; right:30px; background:#fff; border:none; padding:15px; border-radius:50%; cursor:pointer; z-index:600;"><i data-lucide="x" color="black"></i></button>
        <div class="modal-content">
            <img id="m-img" style="width:100%; border-radius:24px; border: 1px solid #333;">
            <div>
                <h1 id="m-title" style="font-family: 'Syncopate'; font-size: 2.2rem; margin-bottom: 20px;"></h1>
                <div id="m-price" style="font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; color: #fff;"></div>
                <p id="m-desc" style="color:#aaa; line-height:2; font-size: 1.1rem; margin-bottom: 40px;"></p>
                <button class="primary">Adicionar ao meu Setup</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- INTERFACE ---
        window.showFallback = () => {
            document.getElementById('main-logo').style.display = 'none';
            document.getElementById('logo-text').style.display = 'block';
        };

        onValue(ref(db, 'market'), (snap) => {
            const data = snap.val();
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            if(data) Object.entries(data).reverse().forEach(([id, p]) => {
                grid.innerHTML += `
                    <div class="item-card" onclick="openModal('${p.img}', '${p.title}', '${p.price}', '${p.desc}')">
                        <img src="${p.img}" class="item-img">
                        <div class="item-info">
                            <div class="item-price">R$ ${p.price}</div>
                            <div style="font-size:0.85rem; color:#888; font-weight:600; text-transform:uppercase;">${p.title}</div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
            // Finaliza intro
            setTimeout(() => document.getElementById('intro').style.transform = 'translateY(-100%)', 2800);
        });

        onValue(ref(db, 'cupons'), (snap) => {
            const data = snap.val();
            const grid = document.getElementById('coupon-list');
            grid.innerHTML = '';
            if(data) Object.entries(data).reverse().forEach(([id, c]) => {
                grid.innerHTML += `
                    <div class="coupon-card">
                        <small style="color:#666; font-weight:800; text-transform:uppercase;">${c.store}</small>
                        <strong class="cp-code">${c.code}</strong>
                        <p style="color:#fff; font-weight:bold">${c.desc}</p>
                    </div>
                `;
            });
        });

        window.publish = async () => {
            const type = document.getElementById('post-type').value;
            if(type === 'prod') {
                const title = document.getElementById('p-title').value;
                const price = document.getElementById('p-price').value;
                const img = document.getElementById('p-img').value;
                const desc = document.getElementById('p-desc').value;
                await push(ref(db, 'market'), { title, price, img, desc });
            } else {
                const store = document.getElementById('c-store').value;
                const code = document.getElementById('c-code').value;
                const desc = document.getElementById('c-desc').value;
                await push(ref(db, 'cupons'), { store, code, desc });
            }
            tab('feed', document.querySelector('.nav-link'));
        };

        window.toggleForm = () => {
            const type = document.getElementById('post-type').value;
            document.getElementById('form-prod').style.display = type === 'prod' ? 'block' : 'none';
            document.getElementById('form-cupom').style.display = type === 'cupom' ? 'block' : 'none';
        };

        window.openModal = (img, title, price, desc) => {
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-price').innerText = 'R$ ' + price;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
