<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Exiled Power</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #000; --glass: rgba(10, 10, 10, 0.95); --border: rgba(255, 255, 255, 0.1); 
            --accent: #fff; --red: #ff4757; --gold: #ffd700; --blue: #00d2ff; --gray: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        aside { width: 280px; background: var(--glass); border-right: 1px solid var(--border); height: 100vh; position: fixed; padding: 30px 20px; z-index: 100; backdrop-filter: blur(20px); }
        .profile-card { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 25px; text-align: center; }
        .user-avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; margin-bottom: 10px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 15px; border-radius: 12px; color: #666; cursor: pointer; transition: 0.3s; margin-bottom: 5px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .nav-link.active { color: #000; background: #fff; }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TOP CURTIDOS --- */
        .top-trending { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 30px; scrollbar-width: none; }
        .top-item { min-width: 150px; background: #080808; border-radius: 15px; border: 1px solid var(--gold); padding: 5px; position: relative; cursor: pointer; }
        .top-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }

        /* --- GRID & CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-p { background: #080808; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; }
        .card-p:hover { border-color: var(--blue); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
        
        .uid-label { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.85); font-size: 0.5rem; padding: 4px 8px; border-radius: 6px; color: var(--blue); font-family: monospace; z-index: 5; border: 1px solid var(--border); }
        
        /* ACTIONS */
        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #111; }
        .vote-btns { display: flex; gap: 15px; align-items: center; }
        .btn-vote { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 800; font-size: 0.8rem; transition: 0.2s; }
        .btn-like { color: var(--red); }
        .btn-dislike { color: #555; }
        .btn-vote:hover { transform: scale(1.1); }
        .delete-btn { color: #333; cursor: pointer; transition: 0.2s; }
        .delete-btn:hover { color: var(--red); }

        /* --- MODAL --- */
        #modal-product { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; padding: 40px; overflow-y: auto; }
        .modal-container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }

        input, textarea, select { width: 100%; background: #0a0a0a; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn-send { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding-bottom: 100px; }
            .modal-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="profile-card" onclick="tab('settings', this)">
            <img src="" id="display-avatar" class="user-avatar">
            <div id="display-name" style="font-weight: 900; font-size: 1rem; color: #fff;">Exiled</div>
            <div style="font-size: 0.6rem; color: var(--blue);"><i data-lucide="shield-check" size="10"></i> ROOT USER</div>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('cupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <h3 style="font-family:'Syncopate'; margin-bottom: 15px; color: var(--gold); font-size: 0.7rem;"><i data-lucide="trending-up"></i> EM ALTA (GIFS & PROMOS)</h3>
            <div class="top-trending" id="top-list"></div>

            <h2 style="font-family:'Syncopate'; margin-bottom: 25px; font-size: 1.1rem;">ÚLTIMAS POSTAGENS</h2>
            <div class="grid" id="grid-p"></div>
        </section>

        <section id="cupons" class="section">
            <h2 style="font-family:'Syncopate'; margin-bottom: 30px;">CUPONS ATIVOS</h2>
            <div class="grid" id="grid-c"></div>
        </section>

        <section id="post" class="section">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 30px; font-family:'Syncopate';">PUBLICAR</h2>
                <select id="post-type" onchange="toggleFields()">
                    <option value="p">Produto (Aceita GIF)</option>
                    <option value="c">Cupom</option>
                </select>
                <div id="fields-p">
                    <input type="text" id="p-title" placeholder="Nome do Produto">
                    <input type="text" id="p-price" placeholder="Preço R$">
                    <textarea id="p-desc" placeholder="Descrição completa e link de reviews..."></textarea>
                    <input type="url" id="p-img" placeholder="Link da Imagem ou GIF Animado">
                    <input type="url" id="p-link" placeholder="Link do site da loja">
                </div>
                <div id="fields-c" style="display:none;">
                    <input type="text" id="c-store" placeholder="Loja">
                    <input type="text" id="c-code" placeholder="CÓDIGO">
                </div>
                <button class="btn-send" onclick="sendPost()"><i data-lucide="upload-cloud"></i> ENVIAR AGORA</button>
            </div>
        </section>

        <section id="settings" class="section">
            <div style="max-width: 500px; margin: 0 auto; background: #080808; padding: 40px; border-radius: 20px; border: 1px solid var(--border);">
                <h2 style="margin-bottom: 20px;">AJUSTES DE PERFIL</h2>
                <input type="text" id="set-name" placeholder="Mudar Nome">
                <input type="file" id="set-avatar-file" accept="image/*">
                <button class="btn-send" onclick="saveProfile()">SALVAR</button>
            </div>
        </section>
    </main>

    <div id="modal-product">
        <button style="position:fixed; top:20px; right:20px; background:#fff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;" onclick="closeModal()"><i data-lucide="x"></i></button>
        <div class="modal-container" id="modal-content"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- IDENTITY ---
        const init = () => {
            if(!localStorage.getItem('tnp_name')) {
                localStorage.setItem('tnp_name', 'Exiled');
                localStorage.setItem('tnp_avatar', 'https://api.dicebear.com/7.x/pixel-art/svg?seed=Exiled');
            }
            document.getElementById('display-name').innerText = localStorage.getItem('tnp_name');
            document.getElementById('display-avatar').src = localStorage.getItem('tnp_avatar');
        };
        init();

        window.saveProfile = () => {
            const name = document.getElementById('set-name').value;
            const file = document.getElementById('set-avatar-file').files[0];
            if(name) localStorage.setItem('tnp_name', name);
            if(file) {
                const reader = new FileReader();
                reader.onloadend = () => { localStorage.setItem('tnp_avatar', reader.result); location.reload(); };
                reader.readAsDataURL(file);
            } else { location.reload(); }
        };

        // --- FIREBASE SYNC ---
        window.sendPost = async () => {
            const type = document.getElementById('post-type').value;
            const payload = {
                type, likes: 0, 
                user: localStorage.getItem('tnp_name'),
                time: Date.now()
            };
            if(type === 'p') {
                payload.title = document.getElementById('p-title').value;
                payload.price = document.getElementById('p-price').value;
                payload.img = document.getElementById('p-img').value;
                payload.desc = document.getElementById('p-desc').value;
                payload.link = document.getElementById('p-link').value;
            } else {
                payload.store = document.getElementById('c-store').value;
                payload.code = document.getElementById('c-code').value;
            }
            await push(ref(db, 'tnp_posts'), payload);
            tab('feed', document.querySelector('.nav-link'));
        };

        onValue(ref(db, 'tnp_posts'), (snap) => {
            const gp = document.getElementById('grid-p');
            const gc = document.getElementById('grid-c');
            const top = document.getElementById('top-list');
            gp.innerHTML = ''; gc.innerHTML = ''; top.innerHTML = '';

            if(!snap.exists()) return;
            const data = Object.entries(snap.val());

            // Trending
            const trending = [...data].sort((a,b) => (b[1].likes || 0) - (a[1].likes || 0)).filter(i => i[1].type === 'p' && i[1].likes > 0).slice(0,6);
            trending.forEach(([id, p]) => {
                top.innerHTML += `<div class="top-item" onclick='openModal("${id}", ${JSON.stringify(p).replace(/"/g, '&quot;')})'>
                    <img src="${p.img}">
                    <div style="font-size:0.6rem; font-weight:900; color:var(--gold); text-align:center; margin-top:3px;">${p.likes} Likes</div>
                </div>`;
            });

            // Feed
            data.reverse().forEach(([id, p]) => {
                if(p.type === 'p') {
                    gp.innerHTML += `
                        <div class="card-p">
                            <div class="uid-label">ID: ${id.substring(1, 7)}</div>
                            <img src="${p.img}" class="card-img" onclick='openModal("${id}", ${JSON.stringify(p).replace(/"/g, '&quot;')})'>
                            <div style="padding:15px">
                                <div style="font-weight:900; font-size:1.1rem">R$ ${p.price}</div>
                                <div style="font-size:0.75rem; color:#666; margin-bottom:12px; height:32px; overflow:hidden;">${p.title}</div>
                                <div class="card-actions">
                                    <div class="vote-btns">
                                        <button class="btn-vote btn-like" onclick="vote('${id}', 1)"><i data-lucide="arrow-big-up"></i> ${p.likes || 0}</button>
                                        <button class="btn-vote btn-dislike" onclick="vote('${id}', -1)"><i data-lucide="arrow-big-down"></i></button>
                                    </div>
                                    <i data-lucide="trash-2" class="delete-btn" size="16" onclick="del('${id}')"></i>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    gc.innerHTML += `<div class="card-p" style="padding:25px; border:2px dashed #444; text-align:center;">
                        <div class="uid-label">ID: ${id.substring(1, 7)}</div>
                        <h2 style="font-size:1.2rem; background:#fff; color:#000; padding:2px 10px; border-radius:5px;">${p.code}</h2>
                        <p style="margin-top:10px; font-size:0.8rem;">${p.store}</p>
                        <i data-lucide="trash-2" class="delete-btn" style="margin-top:10px" onclick="del('${id}')"></i>
                    </div>`;
                }
            });
            lucide.createIcons();
        });

        window.vote = (id, val) => update(ref(db, `tnp_posts/${id}`), { likes: increment(val) });
        window.del = (id) => { if(confirm("Apagar permanentemente?")) remove(ref(db, `tnp_posts/${id}`)); };

        window.openModal = (id, p) => {
            document.getElementById('modal-product').style.display = 'block';
            document.getElementById('modal-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:20px;">
                <div>
                    <h1 style="font-family:'Syncopate'; font-size:1.4rem;">${p.title}</h1>
                    <h2 style="color:var(--gold); margin:15px 0;">R$ ${p.price}</h2>
                    <p style="opacity:0.8; line-height:1.6;">${p.desc || 'Sem detalhes.'}</p>
                    <div style="margin-top:20px; font-size:0.7rem; color:#444;">ID DE CONTROLE: ${id}</div>
                    <a href="${p.link}" target="_blank" style="text-decoration:none;"><button class="btn-send" style="margin-top:30px">VER PROMOÇÃO</button></a>
                </div>
            `;
            lucide.createIcons();
        };

        window.closeModal = () => document.getElementById('modal-product').style.display = 'none';
        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.classList.contains('nav-link')) el.classList.add('active');
        };
        window.toggleFields = () => {
            const type = document.getElementById('post-type').value;
            document.getElementById('fields-p').style.display = type === 'p' ? 'block' : 'none';
            document.getElementById('fields-c').style.display = type === 'c' ? 'block' : 'none';
        };
        lucide.createIcons();
    </script>
</body>
</html>
