<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Elite Market Pro</title>
    <link rel="icon" href="fav.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #050505; 
            --glass: rgba(15, 15, 15, 0.8); 
            --border: rgba(255, 255, 255, 0.08); 
            --accent: #ff4747; 
            --green: #00ff88; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- INTRO SCRIPTADA --- */
        #intro-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; transition: 1s ease-in-out; 
        }
        .intro-logo { width: 250px; animation: float3d 2.5s infinite ease-in-out; filter: drop-shadow(0 0 20px var(--accent)); }
        @keyframes float3d { 0%, 100% { transform: translateY(0) rotateY(0); } 50% { transform: translateY(-20px) rotateY(15deg); } }

        /* --- SIDEBAR REFEITA --- */
        aside { 
            width: 280px; background: var(--glass); backdrop-filter: blur(30px); 
            height: 100vh; border-right: 1px solid var(--border); position: fixed; 
            padding: 40px 20px; z-index: 100; display: flex; flex-direction: column; 
        }
        .sidebar-logo { width: 100%; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; text-align: center; }
        .sidebar-logo img { width: 180px; animation: pulse 2s infinite; }
        
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 16px; 
            border-radius: 12px; color: #888; cursor: pointer; transition: 0.4s; 
            margin-bottom: 10px; font-weight: 600; 
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-link.active { color: #fff; background: var(--accent); box-shadow: 0 10px 20px rgba(255, 71, 71, 0.2); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 280px; padding: 60px; transition: 0.5s; }
        .section { display: none; opacity: 0; transform: translateY(20px); transition: 0.5s forwards; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- INPUTS PRO --- */
        .form-group { max-width: 700px; margin: 0 auto; background: rgba(20,20,20,0.5); padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        input, textarea, select { 
            width: 100%; background: #111; border: 1px solid var(--border); 
            padding: 18px; color: #fff; border-radius: 14px; margin-bottom: 20px; 
            font-size: 1rem; transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--accent); background: #151515; box-shadow: 0 0 15px rgba(255, 71, 71, 0.1); }

        .btn-action { 
            width: 100%; padding: 20px; background: var(--accent); color: white; 
            font-weight: 800; border: none; border-radius: 14px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; 
        }
        .btn-action:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 20px rgba(255, 71, 71, 0.3); }

        /* --- CARDS FEED --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card { 
            background: #0d0d0d; border-radius: 18px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.4s; position: relative; 
        }
        .card:hover { border-color: #555; transform: scale(1.02); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 1px solid var(--border); }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--green); color: #000; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; z-index: 10; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        
        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; border-right: none; border-top: 1px solid var(--border); padding: 10px; }
            main { margin-left: 0; padding: 20px 20px 100px 20px; }
            .sidebar-logo, #user-info { display: none; }
        }
    </style>
</head>
<body>

    <div id="intro-screen"><img src="logo.png" class="intro-logo"></div>

    <aside>
        <div class="sidebar-logo">
            <img src="logo.png" alt="TA NA PROMO">
        </div>
        <div id="user-info" style="text-align: center; margin-bottom: 30px;">
            <img id="my-avatar" src="" style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover;">
            <p id="my-name" style="font-weight: 800; margin-top: 10px; color: #fff; font-size: 0.8rem;"></p>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('post-area', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
        <div class="nav-link" onclick="tab('profile', this)"><i data-lucide="user"></i> <span>Perfil</span></div>
    </aside>

    <main id="app-content">
        <section id="feed" class="section active">
            <div style="display: flex; gap: 15px; margin-bottom: 40px;">
                <input type="text" id="search-input" placeholder="Buscar no market elite..." oninput="filterProducts()" style="margin-bottom:0">
                <select id="cat-filter" onchange="filterProducts()" style="width: 200px; margin-bottom:0">
                    <option value="all">Todas</option>
                    <option value="hardware">Hardware</option>
                    <option value="cupons">Cupons</option>
                </select>
            </div>
            <div class="grid" id="market-grid"></div>
        </section>

        <section id="post-area" class="section">
            <div class="form-group">
                <h2 style="font-family:'Syncopate'; margin-bottom: 30px; text-align:center;">Nova Publicação</h2>
                <select id="p-cat">
                    <option value="hardware">Hardware</option>
                    <option value="perifericos">Periféricos</option>
                    <option value="cupons">Cupom de Desconto</option>
                </select>
                <input type="text" id="p-title" placeholder="Nome do Produto">
                <input type="text" id="p-code" placeholder="Código do Cupom (Opcional)">
                <input type="number" id="p-price" placeholder="Preço Final (R$)">
                <input type="url" id="p-img" placeholder="Link da Imagem/GIF">
                <input type="url" id="p-url" placeholder="Link de Compra">
                <textarea id="p-desc" placeholder="Review ou descrição do produto..." rows="4"></textarea>
                <button class="btn-action" onclick="publish()">Publicar Agora</button>
            </div>
        </section>

        <section id="profile" class="section">
            <div class="form-group" style="max-width: 500px; text-align: center;">
                <h2 style="font-family:'Syncopate'; margin-bottom:30px;">Meu Perfil</h2>
                <input type="text" id="u-name" placeholder="Nome de Usuário">
                <input type="text" id="u-photo" placeholder="Link da Foto (Avatar)">
                <button class="btn-action" onclick="saveProfile()">Salvar Perfil</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const UID = localStorage.getItem('tnp_uid') || 'U'+Math.floor(Math.random()*9999);
        localStorage.setItem('tnp_uid', UID);

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                }, 1000);
            }, 2500);
        };

        let products = [];

        onValue(ref(db, 'market'), (snap) => {
            const val = snap.val();
            products = val ? Object.entries(val).reverse().map(([id,v])=>({id,...v})) : [];
            renderGrid(products);
        });

        onValue(ref(db, `users/${UID}`), (snap) => {
            const u = snap.val() || { name: 'ELITE USER', photo: 'https://via.placeholder.com/150' };
            document.getElementById('my-avatar').src = u.photo;
            document.getElementById('my-name').innerText = u.name;
        });

        function renderGrid(list) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="alert('Funcionalidade de modal expandida!')">
                        ${p.code ? '<div class="badge">CUPOM</div>' : ''}
                        <img src="${p.img || 'https://via.placeholder.com/300'}">
                        <div style="padding:20px">
                            <div style="font-weight:900; color:var(--accent); font-size:1.2rem">R$ ${p.price}</div>
                            <div style="font-size:0.8rem; font-weight:700; color:#888; margin-top:5px; text-transform:uppercase;">${p.title}</div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        window.publish = async () => {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const url = document.getElementById('p-url').value;
            const desc = document.getElementById('p-desc').value;
            const code = document.getElementById('p-code').value;
            const category = document.getElementById('p-cat').value;

            if(!title || !url) return alert("Erro crítico: Título e Link são vitais.");
            await push(ref(db, 'market'), { title, price, img, url, desc, code, category, owner: UID });
            window.location.reload();
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        window.saveProfile = async () => {
            const name = document.getElementById('u-name').value;
            const photo = document.getElementById('u-photo').value;
            await set(ref(db, `users/${UID}`), { name, photo });
            alert("Perfil sincronizado com a rede.");
        };

        lucide.createIcons();
    </script>
</body>
</html>
