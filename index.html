<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tá na Promo! | Gamer Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-body: #050507;
            --bg-side: #0d0d12;
            --bg-card: rgba(22, 22, 28, 0.7);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --accent: #06b6d4;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --hot: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 260px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
        }

        /* --- INTRO ANIMATION --- */
        #intro-loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-body);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .loader-logo {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }

        /* --- SIDEBAR --- */
        aside {
            width: var(--sidebar-width);
            height: 100vh; background: var(--bg-side);
            border-right: 1px solid var(--border);
            position: fixed; left: 0; top: 0;
            padding: 30px 20px; display: flex; flex-direction: column;
            z-index: 100;
        }

        .side-logo {
            font-size: 1.5rem; font-weight: 800; color: var(--primary);
            display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
        }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }

        .nav-btn {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; border-radius: 12px;
            color: var(--text-dim); text-decoration: none;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }

        .nav-btn:hover { background: var(--glass); color: white; }
        .nav-btn.active {
            background: var(--primary-glow);
            color: white; border-color: var(--primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        /* --- MAIN CONTENT --- */
        main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh; padding: 40px;
            transition: 0.3s;
        }

        .tab-content { display: none; animation: slideUp 0.5s ease forwards; }
        .tab-content.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PROMO CARDS --- */
        .promo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--primary-glow);
        }

        .card-banner {
            width: 100%; height: 200px; background: #000;
            position: relative; overflow: hidden;
        }

        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.1); }

        .hot-badge {
            position: absolute; top: 15px; left: 15px;
            background: var(--hot); color: white;
            padding: 5px 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 800;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 0 15px var(--hot);
        }

        .card-body { padding: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; min-height: 2.8rem; }

        .price-box { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
        .price-now { font-size: 1.5rem; font-weight: 800; color: var(--accent); text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        .price-old { color: var(--text-dim); text-decoration: line-through; font-size: 0.9rem; }

        .btn-action {
            width: 100%; padding: 12px; border-radius: 12px;
            border: none; background: var(--primary); color: white;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-action:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* --- FORM --- */
        .glass-form {
            max-width: 700px; margin: 0 auto;
            background: var(--bg-card); padding: 40px;
            border-radius: 24px; border: 1px solid var(--border);
        }

        .input-field {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); border-radius: 12px;
            color: white; margin-top: 8px; margin-bottom: 20px;
            outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: white;
            padding: 15px 30px; border-radius: 12px;
            transform: translateY(200%); transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            aside {
                width: 100%; height: 70px; top: auto; bottom: 0;
                flex-direction: row; padding: 0 10px; border-right: none;
                border-top: 1px solid var(--border);
            }
            .side-logo { display: none; }
            .nav-group { flex-direction: row; width: 100%; justify-content: space-around; align-items: center; }
            .nav-btn span { display: none; }
            main { margin-left: 0; width: 100%; padding: 20px; padding-bottom: 100px; }
        }
    </style>
</head>
<body>

    <div id="intro-loader">
        <div class="loader-logo">Tá na Promo!</div>
        <i data-lucide="loader-2" style="animation: spin 1s linear infinite; color: var(--primary)"></i>
    </div>

    <div id="toast">Ação realizada!</div>

    <aside>
        <div class="side-logo">
            <i data-lucide="zap" fill="currentColor"></i>
            <span>GAMER HUB</span>
        </div>
        <nav class="nav-group">
            <div class="nav-btn active" onclick="navigate('home')">
                <i data-lucide="layout-grid"></i> <span>Feed</span>
            </div>
            <div class="nav-btn" onclick="navigate('post')">
                <i data-lucide="plus-circle"></i> <span>Anunciar</span>
            </div>
            <div class="nav-btn" onclick="navigate('coupons')">
                <i data-lucide="ticket"></i> <span>Cupons</span>
            </div>
            <div class="nav-btn" onclick="navigate('saved')">
                <i data-lucide="heart"></i> <span>Favoritos</span>
            </div>
        </nav>
    </aside>

    <main>
        <section id="home" class="tab-content active">
            <header style="margin-bottom: 40px;">
                <h1 style="font-size: 2.2rem; font-weight: 800;">Ofertas em Tempo Real</h1>
                <p style="color: var(--text-dim);">Os melhores preços detectados pela comunidade.</p>
            </header>
            <div class="promo-grid" id="main-feed"></div>
        </section>

        <section id="post" class="tab-content">
            <div class="glass-form">
                <h2 style="margin-bottom: 30px; color: var(--primary)">Compartilhar Promoção</h2>
                <form id="promo-form">
                    <label>Título do Produto</label>
                    <input type="text" id="f-title" class="input-field" placeholder="Ex: Teclado Mecânico Razer BlackWidow" required>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Preço Promo (R$)</label>
                            <input type="number" step="0.01" id="f-price" class="input-field" required>
                        </div>
                        <div>
                            <label>Preço Original (R$)</label>
                            <input type="number" step="0.01" id="f-old" class="input-field" required>
                        </div>
                    </div>

                    <label>Link da Loja</label>
                    <input type="url" id="f-link" class="input-field" placeholder="https://amazon.com.br/..." required>

                    <label>URL da Imagem</label>
                    <input type="url" id="f-img" class="input-field" placeholder="https://imgur.com/foto.jpg">

                    <button type="submit" class="btn-action" id="submit-btn">
                        <i data-lucide="send"></i> Publicar agora
                    </button>
                </form>
            </div>
        </section>

        <section id="coupons" class="tab-content">
            <h2 style="margin-bottom: 30px;">Cupons Verificados</h2>
            <div class="promo-grid" id="coupon-grid">
                </div>
        </section>

        <section id="saved" class="tab-content">
            <h2 style="margin-bottom: 30px;">Seus Favoritos</h2>
            <div class="promo-grid" id="saved-feed"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const promosRef = ref(db, 'promos');

        let allPromos = [];
        let favorites = JSON.parse(localStorage.getItem('favs')) || [];

        // Navigation
        window.navigate = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(tab === 'saved') renderSaved();
            window.scrollTo(0,0);
        };

        // Render Function
        const renderCards = (data, containerId) => {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            data.forEach(item => {
                const off = Math.round(((item.oldPrice - item.price) / item.oldPrice) * 100);
                const isFav = favorites.includes(item.id);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-banner">
                        ${off > 25 ? `<div class="hot-badge"><i data-lucide="flame" style="width:14px"></i> HOT ${off}% OFF</div>` : ''}
                        <img src="${item.image || 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500'}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500'">
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.title}</h3>
                        <div class="price-box">
                            <span class="price-now">R$ ${parseFloat(item.price).toLocaleString('pt-BR')}</span>
                            <span class="price-old">R$ ${parseFloat(item.oldPrice).toLocaleString('pt-BR')}</span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-action" onclick="window.open('${item.link}', '_blank')">
                                <i data-lucide="shopping-cart"></i> Pegar Promo
                            </button>
                            <button class="btn-action" style="background:var(--glass); width:60px;" onclick="toggleFav('${item.id}')">
                                <i data-lucide="heart" ${isFav ? 'fill="#f43f5e" stroke="#f43f5e"' : ''}></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        };

        // Listen to Firebase
        onValue(promosRef, (snapshot) => {
            const val = snapshot.val();
            allPromos = val ? Object.entries(val).map(([id, data]) => ({ id, ...data })).reverse() : [];
            renderCards(allPromos, 'main-feed');
            
            // Hide Loader
            setTimeout(() => {
                document.getElementById('intro-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-loader').remove(), 800);
            }, 1000);
        });

        // Toggle Favorites
        window.toggleFav = (id) => {
            if(favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
                showToast("Removido dos favoritos");
            } else {
                favorites.push(id);
                showToast("Salvo nos favoritos!");
            }
            localStorage.setItem('favs', JSON.stringify(favorites));
            renderCards(allPromos, 'main-feed');
            if(document.getElementById('saved').classList.contains('active')) renderSaved();
        };

        const renderSaved = () => {
            const favItems = allPromos.filter(p => favorites.includes(p.id));
            renderCards(favItems, 'saved-feed');
        };

        // Submit Form
        document.getElementById('promo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = 'Publicando...';

            const newPromo = {
                title: document.getElementById('f-title').value,
                price: document.getElementById('f-price').value,
                oldPrice: document.getElementById('f-old').value,
                link: document.getElementById('f-link').value,
                image: document.getElementById('f-img').value,
                date: Date.now()
            };

            await push(promosRef, newPromo);
            showToast("Promoção postada com sucesso!");
            e.target.reset();
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="send"></i> Publicar agora';
            navigate('home');
        });

        // Coupons Data
        const coupons = [
            { shop: 'Kabum', code: 'PROMO10', off: '10% OFF' },
            { shop: 'Amazon', code: 'GAMER20', off: 'R$ 20 OFF' },
            { shop: 'Pichau', code: 'MONSTER', off: '5% OFF' },
            { shop: 'AliExpress', code: 'BRL40', off: 'R$ 40 OFF' }
        ];

        const renderCoupons = () => {
            const grid = document.getElementById('coupon-grid');
            grid.innerHTML = coupons.map(c => `
                <div class="card" style="padding: 25px; border: 2px dashed var(--primary); background: rgba(139, 92, 246, 0.05)">
                    <p style="color:var(--text-dim); font-size: 0.8rem; text-transform: uppercase;">${c.shop}</p>
                    <h2 style="margin: 10px 0; color: var(--accent)">${c.off}</h2>
                    <div style="background: black; padding: 10px; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                        <code style="color: var(--primary); font-weight: 800;">${c.code}</code>
                        <i data-lucide="copy" style="cursor:pointer; width:18px" onclick="copyText('${c.code}')"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.copyText = (txt) => {
            navigator.clipboard.writeText(txt);
            showToast("Código copiado!");
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.transform = 'translateY(0)';
            setTimeout(() => t.style.transform = 'translateY(200%)', 3000);
        };

        renderCoupons();
        lucide.createIcons();
    </script>
</body>
</html>
