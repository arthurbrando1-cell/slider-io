<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE MARKET | PRO PLATFORM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #ff004c;
            --bg: #050505;
            --card-bg: #111;
            --border: rgba(255,255,255,0.08);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- ANIMAÇÕES DE ENTRADA --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .section { animation: fadeIn 0.6s ease-out forwards; display: none; }
        .section.active { display: block; }

        /* --- SIDEBAR LUXURY --- */
        aside { 
            width: 280px; height: 100vh; position: fixed; 
            background: rgba(8, 8, 8, 0.8); backdrop-filter: blur(30px);
            border-right: 1px solid var(--border); padding: 40px 20px; z-index: 100;
        }
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 16px; 
            border-radius: 12px; color: #666; cursor: pointer; transition: var(--transition);
            margin-bottom: 8px; font-weight: 500;
        }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; box-shadow: 0 10px 30px rgba(255, 0, 76, 0.2); }

        /* --- MURAL DE CUPONS --- */
        .coupon-banner {
            background: linear-gradient(90deg, #ff004c, #7000ff);
            padding: 15px; border-radius: 12px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
