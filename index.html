<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Exiled Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #000; --glass: rgba(10, 10, 10, 0.98); --border: rgba(255, 255, 255, 0.1); 
            --accent: #fff; --red: #ff4757; --gold: #ffd700; --blue: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        aside { width: 280px; background: var(--glass); border-right: 1px solid var(--border); height: 100vh; position: fixed; padding: 30px 20px; z-index: 100; backdrop-filter: blur(20px); }
        .profile-card { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 25px; text-align: center; cursor: pointer; }
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; margin-bottom: 10px; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 15px; border-radius: 12px; color: #555; cursor: pointer; transition: 0.3s; margin-bottom: 5px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .nav-link.active { color: #000; background: #fff; }

        /* --- CONTENT --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- GRID & CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-p { background: #080808; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; }
        .card-p:hover { border-color: var(--blue); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
        
        .uid-label { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.85); font-size: 0.5rem; padding: 4px 8px; border-radius: 6px; color: var(--blue); font-family: monospace; z-index: 5; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-top: 1px solid #111; }
        .btn-vote { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 800; color: #555; }
        .btn-vote.active-up { color: var(--red); }
        .delete-btn { color: #333; cursor: pointer; }

        /* --- MODAL --- */
        #modal-product { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; padding: 40px; overflow-y: auto; }
        .modal-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; }
        .review-box { background: #0a0a0a; border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-top: 20px; }

        /* --- FORMS --- */
        input, textarea, select { width: 100%; background: #0c0c0c; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .btn-send { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding-bottom: 100px; }
            .modal-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="profile-card" onclick="tab('settings', this)">
            <img src="" id="display-avatar" class="user-avatar">
            <div id="display-name" style="font-weight: 900; font-size: 1rem;">Exiled</div>
            <div style="font-size: 0.6rem; color: var(--blue);"><i data-lucide="shield"></i> ADMIN GIF ENABLED</div>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('cupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <h2 style="font-family:'Syncopate'; margin-bottom: 25px; font-size: 1.1rem;">ÚLTIMAS PROMOS</h2>
            <div class="grid" id="grid-p"></div>
        </section>

        <section id="cupons" class="section">
            <h2 style="font-family:'Syncopate'; margin-bottom: 30px;">CUPONS</h2>
            <div class="grid" id="grid-c"></div>
        </section>

        <section id="post" class="section">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 30px;">POSTAR CONTEÚDO</h2>
                <select id="post-type" onchange="toggleFields()">
                    <option value="p">Produto (Aceita GIF)</option>
                    <option value="c">Cupom</option>
                </select>
                <div id="fields-p">
                    <input type="text" id="p-title" placeholder="Nome">
                    <input type="text" id="p-price" placeholder="Preço">
                    <textarea id="p-desc" placeholder="Descrição detalhada..."></textarea>
                    <input type="url" id="p-img" placeholder="URL da Foto ou GIF">
                    <input type="url" id="p-link" placeholder="Link da Loja">
                </div>
                <div id="fields-c" style="display:none;">
                    <input type="text" id="c-store" placeholder="Loja">
                    <input type="text" id="c-code" placeholder="CÓDIGO">
                </div>
                <button class="btn-send" onclick="sendToFirebase()"><i data-lucide="upload"></i> PUBLICAR</button>
            </div>
        </section>

        <section id="settings" class="section">
            <div style="max-width: 500px; margin: 0 auto; background: #080808; padding: 40px; border-radius: 20px; border: 1px solid var(--border);">
                <h2>MEU PERFIL</h2>
                <p style="font-size: 0.7rem; color: #444; margin-bottom: 15px;">Cole o link de um GIF abaixo para animar seu perfil.</p>
                <input type="text" id="set-name" placeholder="Nome">
                <input type="url" id="set-avatar-url" placeholder="URL do GIF de Perfil">
                <div style="text-align:center; margin: 10px 0; color:#333">OU</div>
                <input type="file" id="set-avatar-file">
                <button class="btn-send" onclick="saveProfile()">SALVAR TUDO</button>
            </div>
        </section>
    </main>

    <div id="modal-product">
        <button style="position:fixed; top:20px; right:20px; background:#fff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;" onclick="closeModal()"><i data-lucide="x"></i></button>
        <div class="modal-container" id="modal-content"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- IDENTITY (EXILED + GIF) ---
        const initIdentity = () => {
            if(!localStorage.getItem('tnp_name')) {
                localStorage.setItem('tnp_name', 'Exiled');
                localStorage.setItem('tnp_avatar', 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/L3Y45TZEmCcENHL2mg/giphy.gif');
            }
            document.getElementById('display-name').innerText = localStorage.getItem('tnp_name');
            document.getElementById('display-avatar').src = localStorage.getItem('tnp_avatar');
        };
        initIdentity();

        window.saveProfile = () => {
            const name = document.getElementById('set-name').value;
            const url = document.getElementById('set-avatar-url').value;
            const file = document.getElementById('set-avatar-file').files[0];
            if(name) localStorage.setItem('tnp_name', name);
            if(url) { localStorage.setItem('tnp_avatar', url); location.reload(); }
            else if(file) {
                const reader = new FileReader();
                reader.onloadend = () => { localStorage.setItem('tnp_avatar', reader.result); location.reload(); };
                reader.readAsDataURL(file);
            } else { location.reload(); }
        };

        // --- FIREBASE OPS ---
        window.sendToFirebase = async () => {
            const type = document.getElementById('post-type').value;
            const payload = {
                type, likes: 0,
                author: localStorage.getItem('tnp_name'),
                avatar: localStorage.getItem('tnp_avatar'),
                time: Date.now()
            };
            if(type === 'p') {
                payload.title = document.getElementById('p-title').value;
                payload.price = document.getElementById('p-price').value;
                payload.img = document.getElementById('p-img').value;
                payload.desc = document.getElementById('p-desc').value;
                payload.link = document.getElementById('p-link').value;
            } else {
                payload.store = document.getElementById('c-store').value;
                payload.code = document.getElementById('c-code').value;
            }
            await push(ref(db, 'tnp_posts'), payload);
            tab('feed', document.querySelector('.nav-link'));
        };

        onValue(ref(db, 'tnp_posts'), (snap) => {
            const gp = document.getElementById('grid-p');
            const gc = document.getElementById('grid-c');
            gp.innerHTML = ''; gc.innerHTML = '';
            if(!snap.exists()) return;
            Object.entries(snap.val()).reverse().forEach(([id, p]) => {
                if(p.type === 'p') {
                    gp.innerHTML += `
                        <div class="card-p">
                            <div class="uid-label">ID: ${id.substring(1, 7)}</div>
                            <img src="${p.img}" class="card-img" onclick='openModal("${id}", ${JSON.stringify(p).replace(/"/g, '&quot;')})'>
                            <div style="padding:15px">
                                <div style="font-weight:900;">R$ ${p.price}</div>
                                <div style="font-size:0.7rem; color:#666; height:30px; overflow:hidden;">${p.title}</div>
                                <div class="card-actions">
                                    <div style="display:flex; gap:10px;">
                                        <button class="btn-vote" onclick="vote('${id}', 1)"><i data-lucide="arrow-big-up" size="16"></i> ${p.likes || 0}</button>
                                        <button class="btn-vote" onclick="vote('${id}', -1)"><i data-lucide="arrow-big-down" size="16"></i></button>
                                    </div>
                                    <i data-lucide="trash-2" size="14" class="delete-btn" onclick="del('${id}')"></i>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    gc.innerHTML += `<div class="card-p" style="padding:20px; text-align:center;">
                        <h2>${p.code}</h2><p>${p.store}</p>
                        <i data-lucide="trash-2" size="14" style="margin-top:10px; cursor:pointer;" onclick="del('${id}')"></i>
                    </div>`;
                }
            });
            lucide.createIcons();
        });

        window.vote = (id, val) => update(ref(db, `tnp_posts/${id}`), { likes: increment(val) });
        window.del = (id) => { if(confirm("Apagar?")) remove(ref(db, `tnp_posts/${id}`)); };

        window.openModal = (id, p) => {
            document.getElementById('modal-product').style.display = 'block';
            document.getElementById('modal-content').innerHTML = `
                <div>
                    <img src="${p.img}" style="width:100%; border-radius:20px; border:1px solid #222;">
                    <h1 style="font-family:'Syncopate'; margin-top:20px;">${p.title}</h1>
                    <h2 style="color:var(--gold); margin:10px 0;">R$ ${p.price}</h2>
                    <p style="opacity:0.7; line-height:1.6;">${p.desc || ''}</p>
                    <a href="${p.link}" target="_blank" style="text-decoration:none;"><button class="btn-send" style="margin-top:20px">IR PARA LOJA</button></a>
                </div>
                <div>
                    <h3 style="font-family:'Syncopate'; font-size:0.7rem;"><i data-lucide="message-square"></i> REVIEWS REAIS</h3>
                    <div class="review-box">
                        <textarea id="rev-txt" placeholder="Sua opinião..."></textarea>
                        <input type="url" id="rev-img" placeholder="Link de foto/gif da prova real">
                        <button class="btn-send" style="padding:10px" onclick="sendReview('${id}')">POSTAR REVIEW</button>
                    </div>
                    <div id="rev-list-${id}" style="margin-top:20px"></div>
                </div>
            `;
            
            onValue(ref(db, `tnp_posts/${id}/reviews`), (snap) => {
                const list = document.getElementById(`rev-list-${id}`);
                list.innerHTML = '';
                if(snap.exists()) {
                    Object.values(snap.val()).reverse().forEach(r => {
                        list.innerHTML += `<div style="padding:15px 0; border-bottom:1px solid #111;">
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                                <img src="${r.avatar}" style="width:25px; height:25px; border-radius:50%">
                                <strong style="font-size:0.7rem">${r.user}</strong>
                            </div>
                            <p style="font-size:0.8rem; color:#aaa">${r.text}</p>
                            ${r.img ? `<img src="${r.img}" style="width:100px; border-radius:8px; margin-top:8px">` : ''}
                        </div>`;
                    });
                }
            });
            lucide.createIcons();
        };

        window.sendReview = async (id) => {
            const text = document.getElementById('rev-txt').value;
            const img = document.getElementById('rev-img').value;
            if(!text) return;
            const rev = { text, img, user: localStorage.getItem('tnp_name'), avatar: localStorage.getItem('tnp_avatar') };
            await push(ref(db, `tnp_posts/${id}/reviews`), rev);
            document.getElementById('rev-txt').value = '';
            document.getElementById('rev-img').value = '';
        };

        window.closeModal = () => document.getElementById('modal-product').style.display = 'none';
        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.classList.contains('nav-link')) el.classList.add('active');
        };
        window.toggleFields = () => {
            const type = document.getElementById('post-type').value;
            document.getElementById('fields-p').style.display = type === 'p' ? 'block' : 'none';
            document.getElementById('fields-c').style.display = type === 'c' ? 'block' : 'none';
        };
        lucide.createIcons();
    </script>
</body>
</html>
