<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #000; --glass: rgba(15, 15, 15, 0.95); --border: rgba(255, 255, 255, 0.1); 
            --accent: #fff; --gray: #222; --red: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        #intro-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; transition: 0.8s; pointer-events: none;
        }

        aside { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            height: 100vh; position: fixed; padding: 40px 20px; z-index: 100;
        }

        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 12px; 
            color: #555; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem;
        }
        .nav-link.active { color: #000; background: #fff; }

        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* CARD PRODUTO REFEITO */
        .card-p { background: #080808; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; position: relative; }
        .card-p:hover { border-color: #444; }
        .card-p img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .card-content { padding: 20px; }
        .price-tag { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .product-title { font-size: 0.85rem; color: #888; margin-bottom: 15px; height: 35px; overflow: hidden; }

        /* INTERAÇÕES */
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); pt: 15px; padding-top: 15px;}
        .btn-icon { background: transparent; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; transition: 0.2s; }
        .btn-icon:hover { color: var(--red); }
        .btn-icon i { width: 18px; }

        .btn-buy { 
            width: 100%; background: #fff; color: #000; padding: 12px; border-radius: 10px; 
            text-decoration: none; display: block; text-align: center; font-weight: 800; margin-top: 15px; transition: 0.3s;
        }
        .btn-buy:hover { background: #ccc; }

        /* ESTRELAS */
        .rating { color: #f1c40f; display: flex; gap: 2px; margin-bottom: 10px; }
        .rating i { width: 14px; }

        .form-container { max-width: 600px; margin: 0 auto; background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
        input, select { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 10px; margin-bottom: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; display: flex; padding: 10px; border-top: 1px solid var(--border); }
            main { margin-left: 0; padding: 20px; padding-bottom: 100px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

    <div id="intro-screen"><h1 style="font-family:Syncopate">TÁ NA PROMO!</h1></div>

    <aside>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="shopping-bag"></i> <span class="hide-mobile">Feed</span></div>
        <div class="nav-link" onclick="tab('cupons', this)"><i data-lucide="ticket"></i> <span class="hide-mobile">Cupons</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-square"></i> <span class="hide-mobile">Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <input type="text" id="search-input" placeholder="O que você está procurando?">
            <div class="grid" id="grid-p"></div>
        </section>

        <section id="cupons" class="section">
            <div class="grid" id="grid-c"></div>
        </section>

        <section id="post" class="section">
            <div class="form-container">
                <h2>POSTAR PROMOÇÃO</h2><br>
                <select id="post-type">
                    <option value="p">Produto</option>
                    <option value="c">Cupom</option>
                </select>
                <input type="text" id="p-title" placeholder="Nome do Produto">
                <input type="text" id="p-price" placeholder="Preço (Ex: 199,90)">
                <input type="url" id="p-img" placeholder="Link da Imagem">
                <input type="url" id="p-link" placeholder="Link de Compra">
                <button class="btn-buy" onclick="sendPost()" style="cursor:pointer">PUBLICAR</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Esconder Intro
        setTimeout(() => document.getElementById('intro-screen').style.opacity = '0', 1000);

        // Renderizar Produtos com TODAS as funções
        onValue(ref(db, 'tnp_posts'), (snap) => {
            const data = snap.val();
            const gp = document.getElementById('grid-p');
            gp.innerHTML = '';
            
            if(data) {
                Object.entries(data).reverse().forEach(([id, p]) => {
                    if(p.type === 'p') {
                        gp.innerHTML += `
                            <div class="card-p">
                                <img src="${p.img}" alt="produto">
                                <div class="card-content">
                                    <div class="rating">
                                        <i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i>
                                        <span style="font-size:0.7rem; color:#666; margin-left:5px;">(4.8)</span>
                                    </div>
                                    <div class="price-tag">R$ ${p.price}</div>
                                    <div class="product-title">${p.title}</div>
                                    
                                    <a href="${p.link}" target="_blank" class="btn-buy">IR PARA A LOJA</a>

                                    <div class="actions">
                                        <button class="btn-icon" onclick="like('${id}', ${p.likes || 0})">
                                            <i data-lucide="heart"></i> <span>${p.likes || 0}</span>
                                        </button>
                                        <button class="btn-icon" onclick="alert('Salvo no carrinho!')">
                                            <i data-lucide="shopping-cart"></i>
                                        </button>
                                        <button class="btn-icon" onclick="share('${p.link}')">
                                            <i data-lucide="share-2"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
                lucide.createIcons();
            }
        });

        // Funções Globais
        window.like = (id, current) => {
            update(ref(db, `tnp_posts/${id}`), { likes: current + 1 });
        };

        window.share = (link) => {
            navigator.clipboard.writeText(link);
            alert("Link copiado para compartilhar!");
        };

        window.sendPost = async () => {
            const payload = {
                type: document.getElementById('post-type').value,
                title: document.getElementById('p-title').value,
                price: document.getElementById('p-price').value,
                img: document.getElementById('p-img').value,
                link: document.getElementById('p-link').value,
                likes: 0
            };
            await push(ref(db, 'tnp_posts'), payload);
            alert("Promoção enviada!");
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
