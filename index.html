<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Elite Market Pro</title>
    <link rel="icon" href="fav.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #030303; 
            --glass: rgba(10, 10, 10, 0.85); 
            --border: rgba(255, 255, 255, 0.05); 
            --accent: #ff4747; 
            --gray-grad: linear-gradient(45deg, #111, #222, #111);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #030303 100%);
        }

        /* --- FUNDO ANIMADO (MESH) --- */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05; z-index: -1;
        }

        /* --- INTRO --- */
        #intro-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; transition: 0.8s; 
        }
        .intro-logo { width: 220px; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--accent)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; background: var(--glass); backdrop-filter: blur(40px); 
            height: 100vh; border-right: 1px solid var(--border); position: fixed; 
            padding: 40px 20px; z-index: 100;
        }
        .sidebar-logo img { width: 100%; margin-bottom: 30px; }
        
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            border-radius: 12px; color: #666; cursor: pointer; transition: 0.3s; 
            margin-bottom: 8px; font-weight: 700; text-transform: uppercase; font-size: 0.75rem;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .nav-link.active { 
            color: #fff; background: var(--accent); 
            box-shadow: 0 8px 15px rgba(255, 71, 71, 0.2); 
        }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 280px; padding: 50px; }
        .section { display: none; animation: slideUp 0.6s ease forwards; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- SEARCH BAR GRADIENTE --- */
        .search-wrapper { position: relative; margin-bottom: 40px; }
        #search-input { 
            width: 100%; background: #080808; border: 1px solid var(--border); 
            padding: 20px 25px; color: #fff; border-radius: 15px;
            font-size: 1rem; outline: none; transition: 0.3s;
            border-image: linear-gradient(to right, #222, #444) 1;
        }
        #search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 71, 71, 0.1); }

        /* --- CARDS & GRIDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        
        /* Estilo Produto */
        .card-prod { 
            background: #0a0a0a; border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.4s;
        }
        .card-prod:hover { transform: translateY(-10px); border-color: #333; }
        .card-prod img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Estilo Cupom */
        .card-cupom {
            background: var(--gray-grad); border-radius: 15px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            animation: gradientAnim 5s infinite linear; background-size: 200% 200%;
        }
        @keyframes gradientAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .btn-copy {
            width: 100%; background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: 900; margin-top: 15px; cursor: pointer;
        }

        /* --- FORMULÁRIOS --- */
        .form-box { max-width: 600px; margin: 0 auto; background: #080808; padding: 40px; border-radius: 25px; border: 1px solid var(--border); }
        input, select, textarea { 
            width: 100%; background: #111; border: 1px solid #222; padding: 15px; 
            color: #fff; border-radius: 12px; margin-bottom: 15px;
        }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; border-right: none; }
            main { margin-left: 0; padding-bottom: 100px; }
            .sidebar-logo { display: none; }
        }
    </style>
</head>
<body>

    <div id="intro-screen"><img src="logo.png" class="intro-logo"></div>

    <aside>
        <div class="sidebar-logo"><img src="logo.png"></div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="shopping-bag"></i> <span>Produtos</span></div>
        <div class="nav-link" onclick="tab('cupons-feed', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post-area', this)"><i data-lucide="plus-square"></i> <span>Postar</span></div>
        <div class="nav-link" onclick="tab('profile', this)"><i data-lucide="user"></i> <span>Perfil</span></div>
    </aside>

    <main id="app-content">
        <section id="feed" class="section active">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Buscar no Ta na Promo!..." oninput="filter()">
            </div>
            <div class="grid" id="grid-produtos"></div>
        </section>

        <section id="cupons-feed" class="section">
            <h2 style="font-family:'Syncopate'; margin-bottom: 30px;">CUPONS ATIVOS</h2>
            <div class="grid" id="grid-cupons"></div>
        </section>

        <section id="post-area" class="section">
            <div class="form-box">
                <h2 style="font-family:'Syncopate'; margin-bottom: 25px;">O QUE VAMOS POSTAR?</h2>
                <select id="p-type" onchange="togglePostFields()">
                    <option value="produto">Produto em Oferta</option>
                    <option value="cupom">Apenas Cupom</option>
                </select>
                <input type="text" id="p-title" placeholder="Nome do Item / Loja">
                <input type="number" id="p-price" placeholder="Preço Final (R$)">
                <div id="field-cupom" style="display:none;">
                    <input type="text" id="p-code" placeholder="Código do Cupom">
                </div>
                <input type="url" id="p-img" placeholder="Link da Imagem / GIF">
                <input type="url" id="p-url" placeholder="Link de Compra">
                <textarea id="p-desc" placeholder="Descrição rápida..." rows="3"></textarea>
                <button class="btn-copy" style="background:var(--accent); color:#fff;" onclick="publish()">PUBLICAR AGORA</button>
            </div>
        </section>

        <section id="profile" class="section">
            <div class="form-box" style="text-align:center;">
                <input type="text" id="u-name" placeholder="Nome">
                <input type="text" id="u-photo" placeholder="Link Foto">
                <button class="btn-copy" onclick="saveProfile()">SALVAR</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Intro
        window.onload = () => setTimeout(() => document.getElementById('intro-screen').style.opacity = '0', 2000);

        // Renderização Dual (Produtos e Cupons)
        onValue(ref(db, 'market'), (snap) => {
            const data = snap.val();
            const list = data ? Object.entries(data).reverse().map(([id,v])=>({id,...v})) : [];
            
            const gridProd = document.getElementById('grid-produtos');
            const gridCupom = document.getElementById('grid-cupons');
            gridProd.innerHTML = ''; gridCupom.innerHTML = '';

            list.forEach(p => {
                if(p.type === 'cupom' || p.code) {
                    gridCupom.innerHTML += `
                        <div class="card-cupom">
                            <h3 style="font-size:0.9rem;">${p.title}</h3>
                            <div style="margin-top:10px; font-weight:900; color:var(--accent)">CÓDIGO: ${p.code}</div>
                            <button class="btn-copy" onclick="copy('${p.code}')">COPIAR</button>
                        </div>
                    `;
                } else {
                    gridProd.innerHTML += `
                        <div class="card-prod">
                            <img src="${p.img}">
                            <div style="padding:15px">
                                <div style="color:var(--accent); font-weight:900">R$ ${p.price}</div>
                                <div style="font-size:0.7rem; opacity:0.6">${p.title}</div>
                            </div>
                        </div>
                    `;
                }
            });
        });

        window.togglePostFields = () => {
            const type = document.getElementById('p-type').value;
            document.getElementById('field-cupom').style.display = type === 'cupom' ? 'block' : 'none';
        };

        window.publish = async () => {
            const type = document.getElementById('p-type').value;
            const title = document.getElementById('p-title').value;
            const code = document.getElementById('p-code').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const url = document.getElementById('p-url').value;
            const desc = document.getElementById('p-desc').value;

            await push(ref(db, 'market'), { type, title, code, price, img, url, desc });
            alert("Publicado!");
        };

        window.copy = (txt) => {
            navigator.clipboard.writeText(txt);
            alert("Cupom Copiado!");
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
