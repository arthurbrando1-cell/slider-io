<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMER SHOP | Minimalist Edition</title>
    
    <link rel="icon" type="image/x-icon" href="fav.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #000000;
            --side: #0a0a0a;
            --card: #111111;
            --border: #222222;
            --primary: #ffffff;
            --secondary: #888888;
            --accent: #333333;
            --text: #ffffff;
            --dim: #666666;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow: hidden; }

        /* --- INTRO COM LOGO.PNG --- */
        #intro {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }
        .intro-logo {
            width: 150px; /* Ajuste o tamanho do seu logo aqui */
            height: auto;
            animation: fadeInOut 2s infinite ease-in-out;
        }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.2; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* --- SIDEBAR MINIMALISTA --- */
        aside {
            width: 220px; background: var(--side); height: 100vh;
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px;
        }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 6px; color: var(--dim); cursor: pointer; transition: var(--transition);
            margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;
        }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: var(--bg); }

        /* --- MAIN & SEARCH --- */
        main { flex: 1; height: 100vh; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .search-container {
            position: sticky; top: 0; background: var(--bg); padding-bottom: 20px; z-index: 10;
        }
        .search-bar {
            width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border);
            padding: 14px 20px; border-radius: 4px; display: flex; align-items: center; gap: 12px;
        }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 0.9rem; }

        /* --- GRID COMPACTO --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 4px; 
            overflow: hidden; cursor: pointer; transition: var(--transition);
        }
        .item-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; filter: grayscale(1); transition: 0.5s; }
        .item-card:hover .item-img { filter: grayscale(0); }
        .item-info { padding: 15px; border-top: 1px solid var(--border); }
        .item-price { font-size: 1.1rem; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
        .item-title { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- PRODUCT MODAL (FADE) --- */
        #product-page {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: none; overflow-y: auto; padding: 60px 20px; backdrop-filter: blur(10px);
        }
        .close-btn { position: fixed; top: 30px; right: 30px; background: none; border: 1px solid var(--dim); color: white; padding: 8px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { border-color: white; background: white; color: black; }
        
        .prod-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; }
        .prod-gallery img { width: 100%; border-radius: 2px; border: 1px solid var(--border); }
        
        /* --- REVIEWS --- */
        .reviews-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        .review-card { border-left: 2px solid var(--accent); padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.02); }
        .review-user { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--secondary); }
        
        textarea { width: 100%; background: #111; border: 1px solid var(--border); padding: 15px; color: white; border-radius: 4px; margin-bottom: 10px; }
        .btn-black { background: white; color: black; border: none; padding: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-black:hover { background: #ccc; }

        @media (max-width: 850px) {
            .prod-container { grid-template-columns: 1fr; }
            aside { display: none; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <img src="logo.png" alt="Logo" class="intro-logo">
    </div>

    <aside>
        <div style="margin-bottom: 40px;">
            <h1 style="font-size: 1.2rem; font-weight: 900; letter-spacing: -1px;">GS.MARKET</h1>
        </div>
        <div class="nav-link active" onclick="showSection('home', this)"><i data-lucide="grid"></i> EXPLORAR</div>
        <div class="nav-link" onclick="showSection('post', this)"><i data-lucide="plus"></i> VENDER</div>
    </aside>

    <main id="home-section">
        <div class="search-container">
            <div class="search-bar">
                <i data-lucide="search" style="width:18px; color:var(--dim)"></i>
                <input type="text" id="main-search" placeholder="PROCURAR ITEM..." oninput="filterItems()">
            </div>
        </div>
        
        <div class="grid" id="items-grid"></div>
    </main>

    <main id="post-section" style="display:none; opacity: 0;">
        <div style="max-width: 500px; margin: 0 auto; padding-top: 50px;">
            <h2 style="font-weight: 900; margin-bottom: 30px;">NOVO ANÚNCIO</h2>
            <input type="text" id="p-title" placeholder="NOME DO PRODUTO" class="search-bar" style="width:100%; margin-bottom:15px; background: #111;">
            <input type="number" id="p-price" placeholder="VALOR (R$)" class="search-bar" style="width:100%; margin-bottom:15px; background: #111;">
            <input type="url" id="p-img" placeholder="URL DA IMAGEM" class="search-bar" style="width:100%; margin-bottom:15px; background: #111;">
            <textarea id="p-desc" placeholder="DESCRIÇÃO TÉCNICA" rows="6"></textarea>
            <button class="btn-black" onclick="publishProduct()">PUBLICAR ITEM</button>
        </div>
    </main>

    <div id="product-page">
        <button class="close-btn" onclick="closeProduct()"><i data-lucide="arrow-left"></i></button>
        <div class="prod-container">
            <div class="prod-gallery">
                <img id="view-img" src="" alt="">
            </div>
            <div class="prod-details">
                <h1 id="view-title" style="font-weight: 900; font-size: 2.5rem; letter-spacing: -1px;"></h1>
                <p id="view-price" style="font-size: 1.8rem; margin: 20px 0; color: #fff;"></p>
                <p id="view-desc" style="color: var(--dim); line-height: 1.8; font-size: 0.95rem;"></p>
                <br><br>
                <button class="btn-black">ADQUIRIR AGORA</button>
                
                <div class="reviews-section">
                    <h3 style="font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px;">FEEDBACK</h3>
                    <div class="review-form">
                        <textarea id="rev-text" placeholder="Escreva sua review..." style="font-size: 0.8rem;"></textarea>
                        <button onclick="sendReview()" style="background:none; border: 1px solid var(--border); color: white; padding: 10px; cursor: pointer;">POSTAR REVIEW</button>
                    </div>
                    <div id="reviews-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const MY_UID = localStorage.getItem('user_uid') || 'U-' + Math.floor(Math.random()*9999);
        localStorage.setItem('user_uid', MY_UID);

        let allProducts = [];
        let activeProductId = null;

        // --- CARREGAR DADOS ---
        onValue(ref(db, 'market'), (snap) => {
            const val = snap.val();
            allProducts = val ? Object.entries(val).map(([id,v])=>({id,...v})).reverse() : [];
            renderGrid(allProducts);
            if(activeProductId) openProduct(activeProductId);
            
            // Sair da Intro
            setTimeout(() => {
                const intro = document.getElementById('intro');
                intro.style.opacity = '0';
                setTimeout(() => intro.style.visibility = 'hidden', 1000);
            }, 2000);
        });

        function renderGrid(data) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="item-card" onclick="openProduct('${p.id}')">
                        <img src="${p.img}" class="item-img">
                        <div class="item-info">
                            <div class="item-price">R$ ${parseFloat(p.price).toLocaleString('pt-BR')}</div>
                            <div class="item-title">${p.title}</div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        window.filterItems = () => {
            const term = document.getElementById('main-search').value.toLowerCase();
            renderGrid(allProducts.filter(p => p.title.toLowerCase().includes(term)));
        };

        window.openProduct = (id) => {
            const p = allProducts.find(x => x.id === id);
            activeProductId = id;
            document.getElementById('view-img').src = p.img;
            document.getElementById('view-title').innerText = p.title;
            document.getElementById('view-price').innerText = 'R$ ' + parseFloat(p.price).toLocaleString('pt-BR');
            document.getElementById('view-desc').innerText = p.desc || 'ESPECIFICAÇÕES NÃO FORNECIDAS.';
            
            const revList = document.getElementById('reviews-list');
            revList.innerHTML = '';
            if(p.reviews) {
                Object.values(p.reviews).reverse().forEach(r => {
                    revList.innerHTML += `
                        <div class="review-card">
                            <div class="review-user">${r.user}</div>
                            <div style="font-size:0.85rem; margin-top:5px; color:#bbb;">${r.text}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('product-page').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        window.closeProduct = () => {
            document.getElementById('product-page').style.display = 'none';
            document.body.style.overflow = 'auto';
            activeProductId = null;
        };

        window.sendReview = async () => {
            const text = document.getElementById('rev-text').value;
            if(!text) return;
            await push(ref(db, `market/${activeProductId}/reviews`), { user: MY_UID, text: text });
            document.getElementById('rev-text').value = '';
        };

        window.publishProduct = async () => {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;

            if(!title || !price || !img) return;

            await push(ref(db, 'market'), { author: MY_UID, title, price, img, desc });
            showSection('home', document.querySelector('.nav-link'));
        };

        window.showSection = (name, el) => {
            document.getElementById('home-section').style.display = name === 'home' ? 'block' : 'none';
            const post = document.getElementById('post-section');
            post.style.display = name === 'post' ? 'block' : 'none';
            if(name === 'post') setTimeout(() => post.style.opacity = '1', 50);
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
