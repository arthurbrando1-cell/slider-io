<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Ultimate Gamer Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #000; --glass: rgba(15, 15, 15, 0.9); --border: rgba(255, 255, 255, 0.1);
            --primary: #fff; --accent: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; overflow-x: hidden; }

        /* --- INTRO --- */
        #intro { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; transition: 1s ease; }
        .intro-logo { width: 400px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        /* --- SIDEBAR --- */
        aside {
            width: 280px; background: var(--glass); backdrop-filter: blur(20px); height: 100vh;
            border-right: 1px solid var(--border); position: fixed; display: flex; flex-direction: column; padding: 30px 20px; z-index: 100;
        }
        .user-box { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 30px; border: 1px solid var(--border); cursor: pointer; }
        .user-box img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 15px; border-radius: 12px; color: #666; cursor: pointer; transition: 0.3s; margin-bottom: 5px; position: relative; }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: #fff; color: #000; font-weight: 800; }
        .badge { position: absolute; right: 15px; background: #ff4444; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* SEARCH */
        .search-container { position: relative; margin-bottom: 40px; max-width: 500px; }
        .search-container input { width: 100%; padding: 15px 20px 15px 50px; background: #111; border: 1px solid #222; border-radius: 50px; color: #fff; outline: none; }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #444; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: #fff; transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-price { font-family: 'Syncopate'; font-size: 1.3rem; margin-bottom: 5px; }

        /* SETUP / CARRINHO */
        .setup-banner { background: #fff; color: #000; padding: 30px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .total-val { font-family: 'Syncopate'; font-size: 2.2rem; }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 500; display: none; padding: 40px; overflow-y: auto; }
        .modal-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; padding-top: 40px; }
        .btn-action { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; transition: 0.3s; }
        .btn-add { background: #fff; color: #000; }
        .btn-rem { background: #1a1a1a; color: #ff4444; border: 1px solid #ff4444; }

        /* VOTOS */
        .vote-bar { display: flex; gap: 10px; margin: 20px 0; }
        .vote-btn { background: #111; border: 1px solid #222; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* REVIEWS */
        .rev-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #111; }

        input, textarea { width: 100%; background: #111; border: 1px solid #222; padding: 15px; border-radius: 10px; color: #fff; margin-bottom: 15px; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding: 20px 20px 100px; }
            .user-box, .nav-link span { display: none; }
            .modal-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="intro"><img src="logo.png" class="intro-logo" onerror="this.style.display='none'"></div>

    <aside>
        <div class="user-box" onclick="tab('profile', this)">
            <img id="side-avatar" src="https://via.placeholder.com/100">
            <div><div id="side-name" style="font-weight: 800; font-size: 0.8rem;">Anônimo</div><div style="font-size: 0.6rem; color: #555;">Editar Perfil</div></div>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('setup', this)"><i data-lucide="cpu"></i> <span>Meu Setup</span> <span class="badge" id="cart-count">0</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-circle"></i> <span>Vender</span></div>
        <div class="nav-link" onclick="tab('profile', this)"><i data-lucide="user"></i> <span>Perfil</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <div class="search-container"><i data-lucide="search"></i><input type="text" placeholder="Pesquisar hardware..." oninput="search(this.value)"></div>
            <div class="grid" id="market-grid"></div>
        </section>

        <section id="setup" class="section">
            <div class="setup-banner">
                <div><p style="font-size: 0.7rem; font-weight: 800;">TOTAL ESTIMADO</p><div class="total-val" id="total-price">R$ 0,00</div></div>
                <i data-lucide="shopping-cart" size="40"></i>
            </div>
            <div class="grid" id="setup-grid"></div>
        </section>

        <section id="post" class="section">
            <div style="max-width: 500px; margin: 0 auto; background: #080808; padding: 30px; border-radius: 20px; border: 1px solid #222;">
                <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; margin-bottom: 20px;">ANUNCIAR PEÇA</h2>
                <input type="text" id="p-title" placeholder="Nome do Produto">
                <input type="number" id="p-price" placeholder="Preço (R$)">
                <input type="url" id="p-img" placeholder="Link da Imagem ou GIF">
                <textarea id="p-desc" placeholder="Descrição e estado..." rows="4"></textarea>
                <button class="btn-action btn-add" onclick="publish()">Postar no Feed</button>
            </div>
        </section>

        <section id="profile" class="section">
            <div style="max-width: 500px; margin: 0 auto; text-align: center;">
                <img id="prev-avatar" src="https://via.placeholder.com/150" style="width:120px; height:120px; border-radius:30px; object-fit:cover; margin-bottom:20px; border: 2px solid #fff;">
                <input type="text" id="u-name" placeholder="Seu Nick">
                <input type="text" id="u-photo" placeholder="Link da Foto/GIF de Perfil" oninput="document.getElementById('prev-avatar').src = this.value">
                <button class="btn-action btn-add" onclick="saveProfile()">Salvar Perfil</button>
            </div>
        </section>
    </main>

    <div id="modal">
        <button onclick="closeModal()" style="position:fixed; top:20px; right:20px; background:#fff; border:none; padding:12px; border-radius:50%; cursor:pointer;"><i data-lucide="x" color="black"></i></button>
        <div class="modal-grid">
            <img id="m-img" style="width:100%; border-radius:20px;">
            <div>
                <h1 id="m-title" style="font-family: 'Syncopate'; font-size: 2rem;"></h1>
                <div id="m-price" style="font-size: 2.5rem; font-weight: 900; margin: 15px 0;"></div>
                <p id="m-desc" style="color:#888; line-height:1.6; margin-bottom:20px;"></p>
                
                <div class="vote-bar">
                    <button class="vote-btn" onclick="vote('up')"><i data-lucide="thumbs-up"></i> <span id="m-up">0</span></button>
                    <button class="vote-btn" onclick="vote('down')"><i data-lucide="thumbs-down"></i> <span id="m-down">0</span></button>
                </div>

                <button id="m-btn-setup" class="btn-action"></button>

                <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
                    <h3>REVIEWS</h3>
                    <textarea id="rev-text" placeholder="O que achou desse item?" rows="2"></textarea>
                    <button onclick="addReview()" style="background:none; border:1px solid #fff; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">Enviar Comentário</button>
                    <div id="m-reviews" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const UID = localStorage.getItem('tnp_uid') || 'U' + Math.floor(Math.random() * 9999);
        localStorage.setItem('tnp_uid', UID);

        let products = [];
        let setup = JSON.parse(localStorage.getItem('my_setup')) || [];
        let activeId = null;

        // Carregar Perfil
        onValue(ref(db, `users/${UID}`), (snap) => {
            const u = snap.val();
            if(u) {
                document.getElementById('side-avatar').src = u.photo || 'https://via.placeholder.com/100';
                document.getElementById('side-name').innerText = u.name || 'Anônimo';
                document.getElementById('u-name').value = u.name || '';
                document.getElementById('u-photo').value = u.photo || '';
                document.getElementById('prev-avatar').src = u.photo || 'https://via.placeholder.com/150';
            }
        });

        // Carregar Market
        onValue(ref(db, 'market'), (snap) => {
            const data = snap.val();
            products = data ? Object.entries(data).reverse().map(([id,v])=>({id,...v})) : [];
            render(products);
            renderSetup();
            if(activeId) openModal(activeId);
            setTimeout(() => document.getElementById('intro').style.opacity = '0', 2000);
            setTimeout(() => document.getElementById('intro').style.display = 'none', 3000);
        });

        function render(items) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            items.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="openModal('${p.id}')">
                        <img src="${p.img}" class="card-img">
                        <div class="card-info">
                            <div class="card-price">R$ ${p.price}</div>
                            <div style="font-size:0.8rem; color:#666;">${p.title}</div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        window.renderSetup = () => {
            const grid = document.getElementById('setup-grid');
            grid.innerHTML = '';
            let total = 0;
            setup.forEach(p => {
                total += parseFloat(p.price);
                grid.innerHTML += `<div class="card" onclick="openModal('${p.id}')"><img src="${p.img}" class="card-img"><div class="card-info"><div class="card-price">R$ ${p.price}</div></div></div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('cart-count').innerText = setup.length;
        };

        window.openModal = (id) => {
            const p = products.find(x => x.id === id);
            activeId = id;
            document.getElementById('m-img').src = p.img;
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-price').innerText = 'R$ ' + p.price;
            document.getElementById('m-desc').innerText = p.desc;
            
            // Botão Setup
            const btn = document.getElementById('m-btn-setup');
            const isSaved = setup.some(s => s.id === id);
            btn.innerText = isSaved ? 'Remover do Setup' : 'Salvar no Meu Setup';
            btn.className = isSaved ? 'btn-action btn-rem' : 'btn-action btn-add';
            btn.onclick = () => toggleSetup(p);

            // Likes
            const ups = p.votes ? Object.values(p.votes).filter(v => v === 'up').length : 0;
            const downs = p.votes ? Object.values(p.votes).filter(v => v === 'down').length : 0;
            document.getElementById('m-up').innerText = ups;
            document.getElementById('m-down').innerText = downs;

            // Reviews
            document.getElementById('m-reviews').innerHTML = p.reviews ? Object.values(p.reviews).reverse().map(r => `<div class="rev-item"><small style="color:#555">${r.user}</small><p>${r.text}</p></div>`).join('') : '<p>Sem reviews.</p>';

            document.getElementById('modal').style.display = 'block';
            lucide.createIcons();
        };

        window.toggleSetup = (p) => {
            const idx = setup.findIndex(s => s.id === p.id);
            if(idx > -1) setup.splice(idx, 1);
            else setup.push(p);
            localStorage.setItem('my_setup', JSON.stringify(setup));
            renderSetup();
            openModal(p.id);
        };

        window.publish = async () => {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            await push(ref(db, 'market'), { title, price, img, desc, votes: {}, reviews: {} });
            tab('feed', document.querySelector('.nav-link'));
        };

        window.saveProfile = async () => {
            const name = document.getElementById('u-name').value;
            const photo = document.getElementById('u-photo').value;
            await set(ref(db, `users/${UID}`), { name, photo });
            alert("Perfil salvo!");
        };

        window.vote = async (type) => { await set(ref(db, `market/${activeId}/votes/${UID}`), type); };
        window.addReview = async () => {
            const text = document.getElementById('rev-text').value;
            const user = document.getElementById('side-name').innerText;
            if(!text) return;
            await push(ref(db, `market/${activeId}/reviews`), { user, text });
            document.getElementById('rev-text').value = '';
        };

        window.search = (t) => render(products.filter(p => p.title.toLowerCase().includes(t.toLowerCase())));
        window.closeModal = () => { document.getElementById('modal').style.display = 'none'; activeId = null; };
        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.classList.contains('nav-link')) el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
