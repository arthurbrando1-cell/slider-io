<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Extreme Edition</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #000; --glass: rgba(15, 15, 15, 0.98); --border: rgba(255, 255, 255, 0.1); 
            --accent: #fff; --red: #ff4757; --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- INTRO --- */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        .intro-logo { width: 300px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- PERFIL UI --- */
        .user-profile { 
            display: flex; align-items: center; gap: 12px; padding: 15px; 
            border: 1px solid var(--border); border-radius: 15px; margin-bottom: 25px; background: #080808;
        }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }

        /* --- SIDEBAR --- */
        aside { width: 280px; background: var(--glass); border-right: 1px solid var(--border); height: 100vh; position: fixed; padding: 30px 20px; z-index: 100; }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; color: #555; cursor: pointer; transition: 0.3s; margin-bottom: 8px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
        .nav-link.active { color: #000; background: #fff; }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-p { background: #080808; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card-p:hover { border-color: #fff; transform: translateY(-5px); }
        .card-p img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* --- MODAL DETALHES --- */
        #modal-product { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; 
            display: none; padding: 40px; overflow-y: auto; backdrop-filter: blur(10px);
        }
        .modal-content { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .modal-close { position: fixed; top: 30px; right: 30px; cursor: pointer; background: #fff; color: #000; border-radius: 50%; padding: 10px; z-index: 2001; }

        /* --- REVIEW SYSTEM --- */
        .review-box { background: #111; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .review-item { padding: 15px 0; border-bottom: 1px solid var(--border); }
        .review-img { width: 100px; border-radius: 8px; margin-top: 10px; display: block; }

        /* --- FORM --- */
        input, textarea, select { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        .btn-main { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
            main { margin-left: 0; padding-bottom: 100px; }
            .modal-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="logo.png" class="intro-logo">
    </div>

    <div id="modal-product">
        <div class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></div>
        <div class="modal-content" id="modal-data">
            </div>
    </div>

    <aside>
        <div class="user-profile">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" id="my-avatar" class="user-avatar">
            <div>
                <div style="font-size: 0.8rem; font-weight: 800;" id="my-name">Usuário Alpha</div>
                <div style="font-size: 0.6rem; opacity: 0.5;">Membro Oficial</div>
            </div>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Mural</span></div>
        <div class="nav-link" onclick="tab('cupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="font-family:'Syncopate';">🔥 TRENDING</h2>
                <input type="text" placeholder="Buscar..." style="width: 250px; margin: 0;">
            </div>
            <div class="grid" id="grid-p"></div>
        </section>

        <section id="cupons" class="section">
            <h2 style="font-family:'Syncopate'; margin-bottom: 30px;">CUPONS</h2>
            <div class="grid" id="grid-c"></div>
        </section>

        <section id="post" class="section">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 30px;">O QUE VAI POSTAR?</h2>
                <select id="post-type" onchange="togglePostFields()">
                    <option value="p">Produto em Promoção</option>
                    <option value="c">Cupom de Desconto</option>
                </select>
                <div id="fields-p">
                    <input type="text" id="p-title" placeholder="Nome do Produto">
                    <input type="text" id="p-price" placeholder="Preço R$">
                    <textarea id="p-desc" placeholder="Descrição, detalhes e especificações..."></textarea>
                    <input type="url" id="p-img" placeholder="URL da Imagem ou GIF">
                    <input type="url" id="p-link" placeholder="Link da Loja">
                </div>
                <div id="fields-c" style="display:none;">
                    <input type="text" id="c-store" placeholder="Loja">
                    <input type="text" id="c-code" placeholder="CÓDIGO">
                </div>
                <button class="btn-main" onclick="sendToFirebase()">PUBLICAR AGORA</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 1500);
            lucide.createIcons();
        };

        // --- LÓGICA DE POSTAGEM ---
        window.togglePostFields = () => {
            const type = document.getElementById('post-type').value;
            document.getElementById('fields-p').style.display = type === 'p' ? 'block' : 'none';
            document.getElementById('fields-c').style.display = type === 'c' ? 'block' : 'none';
        };

        window.sendToFirebase = async () => {
            const type = document.getElementById('post-type').value;
            const payload = { 
                type, 
                likes: 0, 
                user: document.getElementById('my-name').innerText,
                avatar: document.getElementById('my-avatar').src
            };

            if(type === 'p') {
                payload.title = document.getElementById('p-title').value;
                payload.price = document.getElementById('p-price').value;
                payload.desc = document.getElementById('p-desc').value;
                payload.img = document.getElementById('p-img').value;
                payload.link = document.getElementById('p-link').value;
            } else {
                payload.store = document.getElementById('c-store').value;
                payload.code = document.getElementById('c-code').value;
            }

            await push(ref(db, 'tnp_posts'), payload);
            alert("Postado!");
            location.reload();
        };

        // --- RENDER FEED ---
        onValue(ref(db, 'tnp_posts'), (snap) => {
            const data = snap.val();
            const gp = document.getElementById('grid-p');
            const gc = document.getElementById('grid-c');
            gp.innerHTML = ''; gc.innerHTML = '';

            if(!data) return;

            Object.entries(data).reverse().forEach(([id, p]) => {
                if(p.type === 'p') {
                    const card = document.createElement('div');
                    card.className = 'card-p';
                    card.onclick = () => openModal(id, p);
                    card.innerHTML = `
                        <img src="${p.img}">
                        <div style="padding:15px">
                            <div style="font-weight:900; font-size:1.2rem">R$ ${p.price}</div>
                            <div style="font-size:0.8rem; color:#888">${p.title}</div>
                        </div>
                    `;
                    gp.appendChild(card);
                } else {
                    gc.innerHTML += `<div class="card-p" style="padding:20px; border: 2px dashed #444; text-align:center;">
                        <h2>${p.code}</h2>
                        <p>${p.store}</p>
                    </div>`;
                }
            });
        });

        // --- SISTEMA DE MODAL & REVIEWS ---
        window.openModal = (id, p) => {
            const modal = document.getElementById('modal-product');
            const container = document.getElementById('modal-data');
            modal.style.display = 'block';

            container.innerHTML = `
                <div>
                    <img src="${p.img}" style="width:100%; border-radius:20px;">
                    <h1 style="margin-top:20px; font-family:'Syncopate'">${p.title}</h1>
                    <h2 style="color:var(--gold)">R$ ${p.price}</h2>
                    <p style="margin-top:20px; line-height:1.6; opacity:0.8">${p.desc || 'Sem descrição.'}</p>
                    <a href="${p.link}" target="_blank"><button class="btn-main" style="margin-top:20px">IR PARA LOJA</button></a>
                </div>
                <div>
                    <h3>REVIEWS DA GALERA</h3>
                    <div class="review-box">
                        <textarea id="rev-text" placeholder="O que achou desse produto?" style="height:80px"></textarea>
                        <input type="url" id="rev-img" placeholder="Link de foto ou GIF do produto">
                        <button class="btn-main" style="padding:10px" onclick="postReview('${id}')">ENVIAR REVIEW</button>
                    </div>
                    <div id="reviews-list-${id}" style="margin-top:20px"></div>
                </div>
            `;
            
            // Carregar Reviews do Firebase
            onValue(ref(db, `tnp_posts/${id}/reviews`), (revSnap) => {
                const rList = document.getElementById(`reviews-list-${id}`);
                rList.innerHTML = '';
                if(revSnap.exists()) {
                    Object.values(revSnap.val()).reverse().forEach(r => {
                        rList.innerHTML += `
                            <div class="review-item">
                                <div style="display:flex; gap:10px; align-items:center">
                                    <img src="${r.avatar}" style="width:30px; border-radius:50%">
                                    <strong style="font-size:0.8rem">${r.user}</strong>
                                </div>
                                <p style="font-size:0.9rem; margin-top:5px">${r.text}</p>
                                ${r.img ? `<img src="${r.img}" class="review-img">` : ''}
                            </div>
                        `;
                    });
                }
            });
        };

        window.postReview = async (id) => {
            const text = document.getElementById('rev-text').value;
            const img = document.getElementById('rev-img').value;
            if(!text) return alert("Escreva algo!");

            const review = {
                text,
                img,
                user: document.getElementById('my-name').innerText,
                avatar: document.getElementById('my-avatar').src
            };

            await push(ref(db, `tnp_posts/${id}/reviews`), review);
            document.getElementById('rev-text').value = '';
            document.getElementById('rev-img').value = '';
        };

        window.closeModal = () => document.getElementById('modal-product').style.display = 'none';

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
