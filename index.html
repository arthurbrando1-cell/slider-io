<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÁ NA PROMO! | Oficial</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #000; --glass: rgba(15, 15, 15, 0.98); --border: rgba(255, 255, 255, 0.1); 
            --accent: #fff; --gray: #222; --red: #ff4757; --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- INTRO GIGANTE --- */
        #intro-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s ease-in-out; 
        }
        .intro-logo { width: 450px; animation: superPulse 2s infinite; filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); }
        @keyframes superPulse { 
            0% { transform: scale(0.9); opacity: 0.6; } 
            50% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(0.9); opacity: 0.6; } 
        }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            height: 100vh; position: fixed; padding: 40px 20px; z-index: 100; backdrop-filter: blur(15px);
        }
        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 12px; 
            color: #555; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { color: #000; background: #fff; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- CONTENT --- */
        main { flex: 1; margin-left: 280px; padding: 40px; }
        .section { display: none; animation: fadeIn 0.8s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRID DE PRODUTOS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card-p { background: #080808; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; position: relative; }
        .card-p:hover { border-color: #fff; transform: translateY(-5px); }
        .card-p img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Badge de Popular */
        .badge-popular { position: absolute; top: 10px; left: 10px; background: var(--gold); color: #000; padding: 5px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 900; z-index: 10; }

        /* --- INTERAÇÕES --- */
        .card-body { padding: 20px; }
        .price { font-size: 1.4rem; font-weight: 900; margin-bottom: 5px; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .btn-like { background: none; border: none; color: #444; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .btn-like:hover { color: var(--red); }
        .btn-like.active { color: var(--red); }

        /* --- MURAL DE CUPONS --- */
        .card-c { background: #111; padding: 30px; border-radius: 15px; border: 2px dashed #333; text-align: center; }
        .code-box { background: #fff; color: #000; padding: 12px; border-radius: 8px; font-weight: 900; margin: 15px 0; letter-spacing: 2px; cursor: pointer; }

        /* --- FORMS --- */
        .form-container { max-width: 700px; margin: 0 auto; background: #0a0a0a; padding: 40px; border-radius: 25px; border: 1px solid var(--border); }
        .post-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; background: #111; border: 1px solid var(--border); color: #fff; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .tab-btn.active { background: #fff; color: #000; }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 15px; }
        .btn-post { width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 10px; border-right: none; border-top: 1px solid var(--border); }
            main { margin-left: 0; padding-bottom: 100px; }
            .intro-logo { width: 80%; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="logo.png" alt="TÁ NA PROMO!" class="intro-logo">
        <p style="margin-top: 20px; letter-spacing: 5px; font-size: 0.7rem; opacity: 0.5;">CARREGANDO OFERTAS...</p>
    </div>

    <aside>
        <div style="text-align: center; margin-bottom: 30px;" class="hide-mobile">
            <img src="logo.png" style="width: 140px;">
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="zap"></i> <span>Populares</span></div>
        <div class="nav-link" onclick="tab('feed', this)"><i data-lucide="shopping-bag"></i> <span>Produtos</span></div>
        <div class="nav-link" onclick="tab('cupons', this)"><i data-lucide="ticket"></i> <span>Cupons</span></div>
        <div class="nav-link" onclick="tab('post', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <h2 style="font-family:'Syncopate'; margin-bottom: 25px;">OFERTAS DA COMUNIDADE</h2>
            <div class="grid" id="grid-p"></div>
        </section>

        <section id="cupons" class="section">
            <h2 style="font-family:'Syncopate'; margin-bottom: 30px;">CUPONS ATIVOS</h2>
            <div class="grid" id="grid-c"></div>
        </section>

        <section id="post" class="section">
            <div class="form-container">
                <div class="post-tabs">
                    <button class="tab-btn active" onclick="switchPostType('p', this)">PRODUTO</button>
                    <button class="tab-btn" onclick="switchPostType('c', this)">CUPOM</button>
                </div>

                <div id="form-p">
                    <input type="text" id="p-title" placeholder="Nome do Produto">
                    <input type="text" id="p-price" placeholder="Preço R$">
                    <input type="url" id="p-img" placeholder="Link da Imagem (URL)">
                    <input type="url" id="p-link" placeholder="Link da Loja">
                </div>

                <div id="form-c" style="display:none;">
                    <input type="text" id="c-store" placeholder="Loja">
                    <input type="text" id="c-code" placeholder="CÓDIGO DO CUPOM">
                    <input type="text" id="c-desc" placeholder="Regras/Descrição">
                </div>
                
                <button class="btn-post" onclick="sendPost()">PUBLICAR AGORA</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Intro
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 1000);
            }, 2000);
        };

        // Troca tipo de Post
        window.switchPostType = (type, el) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('form-p').style.display = type === 'p' ? 'block' : 'none';
            document.getElementById('form-c').style.display = type === 'c' ? 'block' : 'none';
            window.currentPostType = type;
        }
        window.currentPostType = 'p';

        // Sync e Render (Com Lógica de Populares)
        onValue(ref(db, 'tnp_posts'), (snap) => {
            const data = snap.val();
            const gp = document.getElementById('grid-p');
            const gc = document.getElementById('grid-c');
            gp.innerHTML = ''; gc.innerHTML = '';

            if(!data) return;

            const items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            
            // Ordenar por Populares (Mais likes primeiro)
            items.sort((a, b) => (b.likes || 0) - (a.likes || 0));

            items.forEach((p) => {
                if(p.type === 'c') {
                    gc.innerHTML += `
                        <div class="card-c">
                            <div style="font-size:0.7rem; color:#888">${p.store}</div>
                            <div class="code-box" onclick="copy('${p.code}')">${p.code}</div>
                            <div style="font-size:0.8rem;">${p.desc}</div>
                        </div>
                    `;
                } else {
                    const isPopular = (p.likes > 5) ? '<div class="badge-popular">MAIS BUSCADO</div>' : '';
                    gp.innerHTML += `
                        <div class="card-p">
                            ${isPopular}
                            <img src="${p.img}">
                            <div class="card-body">
                                <div class="price">R$ ${p.price}</div>
                                <div style="font-size:0.8rem; color:#666; height:40px; overflow:hidden;">${p.title}</div>
                                <div class="actions">
                                    <button class="btn-like" onclick="like('${p.id}')">
                                        <i data-lucide="heart"></i> <span>${p.likes || 0}</span>
                                    </button>
                                    <div style="font-size:0.7rem; opacity:0.5">Reviews (12)</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            lucide.createIcons();
        });

        window.like = (id) => {
            update(ref(db, `tnp_posts/${id}`), { likes: increment(1) });
        };

        window.sendPost = async () => {
            const type = window.currentPostType;
            let payload = { type, likes: 0, date: Date.now() };
            
            if(type === 'p') {
                payload.title = document.getElementById('p-title').value;
                payload.price = document.getElementById('p-price').value;
                payload.img = document.getElementById('p-img').value;
                payload.link = document.getElementById('p-link').value;
            } else {
                payload.store = document.getElementById('c-store').value;
                payload.code = document.getElementById('c-code').value;
                payload.desc = document.getElementById('c-desc').value;
            }

            await push(ref(db, 'tnp_posts'), payload);
            alert("Publicado com Sucesso!");
            tab('feed', document.querySelector('.nav-link'));
        };

        window.copy = (t) => { navigator.clipboard.writeText(t); alert("Copiado!"); };

        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
