<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA NA PROMO! | Elite Market Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #000; --glass: rgba(12, 12, 12, 0.95); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        aside { width: 260px; background: var(--glass); backdrop-filter: blur(20px); height: 100vh; border-right: 1px solid var(--border); position: fixed; padding: 30px 15px; z-index: 100; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 10px; color: #555; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); border-left: 4px solid #fff; }

        /* --- MAIN --- */
        main { flex: 1; margin-left: 260px; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #0d0d0d; border-radius: 8px; overflow: hidden; transition: 0.2s; cursor: pointer; border: 1px solid transparent; position: relative; }
        .card:hover { border-color: #fff; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); border: none; color: white; padding: 5px; border-radius: 5px; cursor: pointer; z-index: 10; display: none; }

        /* --- MODAL --- */
        #modal { position: fixed; inset: 0; background: #000; z-index: 500; display: none; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 1200px; margin: 0 auto; display: flex; gap: 40px; background: #080808; padding: 30px; border-radius: 20px; }
        .ali-left { flex: 1; } .ali-right { flex: 1.2; }
        .btn-buy { width: 100%; padding: 20px; background: #fff; color: #000; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-shop { background: #ff4747; color: white; } /* Cor AliExpress */

        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 14px; color: #fff; border-radius: 8px; margin-bottom: 15px; }

        @media (max-width: 900px) {
            aside { width: 100%; height: 60px; bottom: 0; top: auto; flex-direction: row; }
            main { margin-left: 0; padding-bottom: 100px; }
            .modal-content { flex-direction: column; }
        }
    </style>
</head>
<body>

    <aside>
        <div id="user-info" style="margin-bottom: 20px; text-align: center;">
            <img id="my-avatar" src="" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff;">
            <p id="my-name" style="font-weight: 800; font-size: 0.7rem; margin-top: 5px;"></p>
        </div>
        <div class="nav-link active" onclick="tab('feed', this)"><i data-lucide="layout-grid"></i> <span>Feed</span></div>
        <div class="nav-link" onclick="tab('post-area', this)"><i data-lucide="plus-circle"></i> <span>Postar</span></div>
        <div class="nav-link" onclick="tab('profile', this)"><i data-lucide="user"></i> <span>Perfil</span></div>
    </aside>

    <main>
        <section id="feed" class="section active">
            <h2 style="font-family:'Syncopate'; margin-bottom:20px;">OFERTAS DA COMUNIDADE</h2>
            <div class="grid" id="market-grid"></div>
        </section>

        <section id="post-area" class="section">
            <div style="max-width: 600px; margin: 0 auto; background: #0a0a0a; padding: 30px; border-radius: 15px; border: 1px solid #222;">
                <h2 style="margin-bottom:20px;">NOVA PROMOÇÃO</h2>
                <input type="text" id="p-title" placeholder="Nome do Produto">
                <input type="number" id="p-price" placeholder="Preço (R$)">
                <input type="url" id="p-img" placeholder="Link da Imagem/GIF">
                <input type="url" id="p-url" placeholder="Link de Compra (AliExpress, Amazon, etc)">
                <textarea id="p-desc" placeholder="Descrição..." rows="4"></textarea>
                <button class="btn-buy" onclick="publish()">Publicar Agora</button>
            </div>
        </section>

        <section id="profile" class="section">
            <div style="max-width: 400px; margin: 0 auto; text-align: center;">
                <input type="text" id="u-name" placeholder="Seu Nome">
                <input type="text" id="u-photo" placeholder="Link Foto Perfil">
                <button class="btn-buy" onclick="saveProfile()">Salvar Perfil</button>
            </div>
        </section>
    </main>

    <div id="modal">
        <button onclick="closeModal()" style="position:fixed; top:20px; right:20px; background:#fff; border:none; padding:10px; border-radius:50%; cursor:pointer;"><i data-lucide="x" color="#000"></i></button>
        <div class="modal-content">
            <div class="ali-left"><img id="m-img" style="width:100%; border-radius:12px;"></div>
            <div class="ali-right">
                <h1 id="m-title" style="font-family:'Syncopate';"></h1>
                <div id="m-price" style="font-size:2.5rem; font-weight:900; margin:15px 0;"></div>
                <p id="m-desc" style="color:#888; margin-bottom:30px;"></p>
                
                <a id="m-link" href="#" target="_blank" class="btn-buy btn-shop">IR PARA A LOJA <i data-lucide="external-link" style="width:16px;"></i></a>
                <button id="m-setup-btn" class="btn-buy" style="background: #222; color: #fff;">SALVAR NO SETUP</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMoxCYuvhRQtRzPm4KSpRo5qtPr3keu0I",
            authDomain: "devgram-f7c0d.firebaseapp.com",
            databaseURL: "https://devgram-f7c0d-default-rtdb.firebaseio.com",
            projectId: "devgram-f7c0d",
            storageBucket: "devgram-f7c0d.firebasestorage.app",
            messagingSenderId: "813511319694",
            appId: "1:813511319694:web:ed579ca37622e84ed7e9df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const UID = localStorage.getItem('tnp_uid') || 'U'+Math.floor(Math.random()*9999);
        localStorage.setItem('tnp_uid', UID);

        let products = [];

        // Carregar Perfil
        onValue(ref(db, `users/${UID}`), (snap) => {
            const u = snap.val() || { name: 'Gamer', photo: 'https://via.placeholder.com/80' };
            document.getElementById('my-avatar').src = u.photo;
            document.getElementById('my-name').innerText = u.name;
        });

        // Carregar Feed
        onValue(ref(db, 'market'), (snap) => {
            const val = snap.val();
            products = val ? Object.entries(val).reverse().map(([id,v])=>({id,...v})) : [];
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const isOwner = p.owner === UID;
                grid.innerHTML += `
                    <div class="card">
                        <button class="delete-btn" style="display:${isOwner?'block':'none'}" onclick="deleteItem('${p.id}', event)"><i data-lucide="trash-2" size="16"></i></button>
                        <div onclick="openModal('${p.id}')">
                            <img src="${p.img}">
                            <div style="padding:10px">
                                <div style="font-weight:900">R$ ${p.price}</div>
                                <div style="font-size:0.7rem; color:#555">${p.title}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        });

        window.publish = async () => {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const url = document.getElementById('p-url').value;
            const desc = document.getElementById('p-desc').value;
            if(!title || !url) return alert("Nome e Link de compra são obrigatórios!");
            
            await push(ref(db, 'market'), { title, price, img, url, desc, owner: UID });
            tab('feed', document.querySelector('.nav-link'));
        };

        window.deleteItem = async (id, e) => {
            e.stopPropagation();
            if(confirm("Deseja apagar sua postagem?")) {
                await remove(ref(db, `market/${id}`));
            }
        };

        window.openModal = (id) => {
            const p = products.find(x => x.id === id);
            document.getElementById('m-img').src = p.img;
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-price').innerText = 'R$ ' + p.price;
            document.getElementById('m-desc').innerText = p.desc;
            document.getElementById('m-link').href = p.url;
            document.getElementById('modal').style.display = 'block';
            lucide.createIcons();
        };

        window.saveProfile = async () => {
            const name = document.getElementById('u-name').value;
            const photo = document.getElementById('u-photo').value;
            await set(ref(db, `users/${UID}`), { name, photo });
            alert("Perfil salvo!");
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';
        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.classList.contains('nav-link')) el.classList.add('active');
        };
        lucide.createIcons();
    </script>
</body>
</html>
